<!DOCTYPE html>
<!-- WorkBoard redesign build 2026-07-03 (light theme + today redesign) -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkBoard — 업무 현황판</title>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where,
    getDocs, onSnapshot, orderBy, Timestamp, deleteDoc, addDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDi23uzT0iokcCqU8rURUwSRPikaFALaR4",
    authDomain:        "dailywork-6ceda.firebaseapp.com",
    projectId:         "dailywork-6ceda",
    storageBucket:     "dailywork-6ceda.firebasestorage.app",
    messagingSenderId: "542297301092",
    appId:             "1:542297301092:web:a266a4891a09159087ff71"
  };
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // 텔레그램 — Cloudflare Worker 주소만 넣으면 동작(비었으면 조용히 skip)
  const TG_WORKER_URL = "https://workboard-telegram.내계정.workers.dev";

  // ── 상수 ──
  const DEFAULT_START = "09:00", DEFAULT_END = "18:00";
  const hoursRange = (start=DEFAULT_START, end=DEFAULT_END) => {
    let s = parseInt((start||"").slice(0,2),10), e = parseInt((end||"").slice(0,2),10);
    if (isNaN(s)||isNaN(e)||s<0||e>24||e<=s){ s=9; e=18; }
    const arr=[]; for(let h=s;h<e;h++) arr.push(String(h).padStart(2,"0")+":00"); return arr;
  };
  const HOURS = hoursRange();
  const DAYS  = ["월","화","수","목","금"];
  const STATUS_LABEL = { done:"완료", wip:"진행중", todo:"미완", skip:"미완" };
  const SVAR = { done:"var(--success)", wip:"var(--warn)", todo:"var(--text-3)", skip:"var(--text-3)" };
  const toMin = t => { const m=/^(\d{1,2}):(\d{2})/.exec(t||""); return m?(+m[1])*60+(+m[2]):null; };
  const nowHM = () => { const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
  const lateInfo = (clockIn, workStart) => {
    const ci=toMin(clockIn), ws=toMin(workStart||DEFAULT_START);
    if(ci==null||ws==null) return {late:false,mins:0};
    return { late: ci>ws, mins: Math.max(0,ci-ws) };
  };

  // 무료 규칙기반 자동정리
  function autoOrganize(text){
    const out={items:[],goals:[],blocker:""};
    if(!text||!text.trim()) return out;
    const segs=text.split(/[\n,;·、]| 그리고 /).map(s=>s.trim()).filter(Boolean);
    for(const seg of segs){
      let hour=null, m=/(\d{1,2}):(\d{2})/.exec(seg);
      if(m) hour=String(+m[1]).padStart(2,"0")+":00";
      else { let h=/(오전|오후)?\s*(\d{1,2})\s*시/.exec(seg); if(h){let hh=+h[2]; if(h[1]==="오후"&&hh<12)hh+=12; if(h[1]==="오전"&&hh===12)hh=0; hour=String(hh).padStart(2,"0")+":00";} }
      let status="todo";
      if(/(막힘|막혔|막혀|대기|블로커|안됨|안 됨|권한\s*없|이슈|문제)/.test(seg)) status="blocker";
      else if(/(완료|했음|했고|끝냄|끝|발송|보냄|보냈|제출|처리함|done)/.test(seg)) status="done";
      else if(/(진행|하는 중|하다|작업 중|작업중|중임|wip)/.test(seg)) status="wip";
      else if(/(예정|할 것|할것|해야|내일|todo|계획)/.test(seg)) status="todo";
      let title=seg.replace(/(\d{1,2}:\d{2})/,"").replace(/(오전|오후)?\s*\d{1,2}\s*시/,"").trim();
      title=title.replace(/(했고|했음|하다가|하다|예정임|예정|막힘|막혔음)$/,"").trim();
      if(!title) title=seg.trim();
      if(status==="blocker") out.blocker = out.blocker ? out.blocker+" / "+title : title;
      else out.items.push({title,status,hour});
    }
    out.goals=out.items.filter(i=>i.status==="todo").slice(0,3).map(i=>i.title);
    return out;
  }

  // ── 상태 ──
  let currentUser=null, userRole=null, userProfile=null, selectedStaffUid=null, unsubListeners=[];
  let todayTasks=[]; // 오늘 슬롯 캐시(직원 오늘 화면)

  // ── 유틸 ──
  const today = () => new Date().toISOString().slice(0,10);
  const weekStart = (d=new Date()) => { const day=d.getDay()||7; const mon=new Date(d); mon.setDate(d.getDate()-(day-1)); return mon.toISOString().slice(0,10); };
  const $ = id => document.getElementById(id);
  const el = (tag,cls,html='') => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };
  const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const isValidUrl = u => /^https?:\/\/\S+$/i.test((u||'').trim());
  const newKey = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const dateLabel = (ds) => { const d=new Date(ds+"T00:00:00"); const w=["일","월","화","수","목","금","토"][d.getDay()]; return `${d.getMonth()+1}월 ${d.getDate()}일 (${w})`; };

  // ── 텔레그램 ──
  async function sendTelegram(name, date, summary){
    const text=`📋 WorkBoard 업무 보고\n👤 ${name} — ${date}\n${summary}\n\n🔗 확인: ${location.href}`;
    if(!TG_WORKER_URL||TG_WORKER_URL.includes("내계정")) return;
    try{ await fetch(TG_WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})}); }catch(e){}
  }

  // ── AUTH ──
  onAuthStateChanged(auth, async user => {
    if(user){ currentUser=user; const snap=await getDoc(doc(db,"users",user.uid)); userProfile=snap.data()||{}; userRole=userProfile.role||'staff'; showApp(); }
    else { currentUser=null; showLogin(); }
  });
  window.doLogin = async () => {
    const id=$('login-id').value.trim(), pw=$('login-pw').value, err=$('login-err'); err.textContent='';
    if(!id||!pw){ err.textContent='아이디와 비밀번호를 입력하세요.'; return; }
    try { await signInWithEmailAndPassword(auth, `${id}@workboard.internal`, pw); }
    catch(e){ const c=(e&&e.code)||'';
      if(c.includes('invalid-credential')||c.includes('user-not-found')||c.includes('wrong-password')) err.textContent='아이디 또는 비밀번호가 올바르지 않습니다.';
      else if(c.includes('too-many-requests')) err.textContent='요청이 많습니다. 잠시 후 다시 시도하세요.';
      else err.textContent='로그인 실패: '+(e.message||c);
    }
  };
  window.doLogout = async () => { await signOut(auth); };

  // ── 화면 전환 ──
  function resetAppUI(){ unsubListeners.forEach(u=>{try{u();}catch(e){}}); unsubListeners=[]; selectedStaffUid=null; todayTasks=[]; if($('sidebar'))$('sidebar').innerHTML=''; if($('main-content'))$('main-content').innerHTML=''; }
  function showLogin(){ resetAppUI(); $('login-screen').style.display='flex'; $('app-screen').style.display='none'; }
  function showApp(){
    resetAppUI();
    $('login-screen').style.display='none'; $('app-screen').style.display='flex';
    $('user-name-badge').textContent=userProfile.displayName||currentUser.email;
    $('role-badge').textContent=userRole==='boss'?'관리자':'직원';
    $('role-badge').className='role-badge '+(userRole==='boss'?'boss':'');
    if(userRole==='boss') renderBossView(); else renderStaffView(currentUser.uid);
  }

  // ══════════════════════════════════════
  //  직원 뷰
  // ══════════════════════════════════════
  function renderStaffView(uid){
    if($('sidebar')) $('sidebar').style.display='none';
    const main=$('main-content'); main.innerHTML='';
    const wrap=el('div','staff-wrap');
    wrap.innerHTML=`
      <div class="page-header">
        <div><div class="page-title">내 업무</div><div class="page-sub">${dateLabel(today())}</div></div>
        <div class="tabbar">
          <button class="tabbtn active" id="tb-today" onclick="switchTab('today')">오늘</button>
          <button class="tabbtn" id="tb-week" onclick="switchTab('week')">주간</button>
          <button class="tabbtn" id="tb-history" onclick="switchTab('history')">지난 기록</button>
        </div>
      </div>
      <div id="tab-today" class="tab-panel"></div>
      <div id="tab-week" class="tab-panel" style="display:none"></div>
      <div id="tab-history" class="tab-panel" style="display:none"></div>`;
    main.appendChild(wrap);
    renderTodayDetail(uid,'tab-today');
  }
  window.switchTab = (tab) => {
    ['today','week','history'].forEach(t=>{ const p=$('tab-'+t); if(p)p.style.display=t===tab?'':'none'; const b=$('tb-'+t); if(b)b.classList.toggle('active',t===tab); });
    if(tab==='week' && currentUser) renderWeekTimetable(currentUser.uid,'tab-week',hoursRange(userProfile.workStart,userProfile.workEnd));
    if(tab==='history' && currentUser) renderHistory(currentUser.uid,'tab-history');
  };

  // ── 오늘 화면(단일 흐름) ──
  async function renderTodayDetail(uid, containerId){
    const wrap=$(containerId); const dateStr=today();
    const ws=(userProfile&&userProfile.workStart)||DEFAULT_START, we=(userProfile&&userProfile.workEnd)||DEFAULT_END;
    wrap.innerHTML=`
      <div id="mode-banner"></div>

      <div class="row-between soft-card" style="padding:10px 14px;margin-bottom:14px">
        <div class="clock-line" id="clock-status">아직 출근 전</div>
        <div class="row" style="gap:6px">
          <input id="work-start" type="time" class="mini-input" value="${ws}">
          <span class="muted">~</span>
          <input id="work-end" type="time" class="mini-input" value="${we}">
          <button class="btn btn-ghost" onclick="saveWorkHours('${uid}')">시간</button>
          <button class="btn btn-primary" onclick="doClock('${uid}','in')">출근</button>
          <button class="btn btn-ghost" onclick="doClock('${uid}','out')">퇴근</button>
        </div>
      </div>

      <div id="routines-box" style="margin-bottom:16px"></div>

      <div class="sec-head"><span class="sec-title">오늘 할 일</span><span id="save-status" class="muted">입력하면 자동 저장돼요</span></div>
      <div id="task-list"></div>
      <div class="add-row">
        <i class="add-plus">＋</i>
        <input id="new-task" class="add-input" placeholder="한 줄씩 편하게 추가 · Enter" onkeydown="if(event.key==='Enter')addTask('${uid}')">
        <button class="btn btn-primary" onclick="addTask('${uid}')">추가</button>
      </div>
      <div style="margin-top:8px"><span class="link-btn" onclick="toggleBulk()">여러 개 한번에 붙여넣기 ▾</span></div>
      <div id="bulk-box" style="display:none;margin-top:8px">
        <textarea id="brain-dump" class="ta" placeholder="예) 견적서 3건 발송, 10시 회의, 신규페이지 초안 진행중, 재고정리 예정" style="height:60px"></textarea>
        <div class="row" style="justify-content:flex-end;margin-top:6px"><button class="btn btn-ghost" onclick="doAutoOrganize('${uid}')">자동 정리 미리보기</button></div>
        <div id="organize-preview"></div>
      </div>

      <div class="wrap-toggle" onclick="toggleWrapup()">
        <span><i id="wrap-caret">▸</i> 하루 마무리 <span class="muted">· 회고 · 막힌 것 · 내일 계획</span></span>
        <span id="wrap-check" class="muted"></span>
      </div>
      <div id="wrapup" style="display:none">
        <div class="soft-card" style="margin-top:10px">
          <label class="fld">자체 피드백</label>
          <textarea id="self-feedback" class="ta" placeholder="오늘 이슈·반성·특이사항" oninput="scheduleDailySave()"></textarea>
          <label class="fld" style="margin-top:12px">배운 점 / 개선점 (회고)</label>
          <textarea id="improve-input" class="ta" placeholder="오늘 배운 점, 다음에 개선할 점" oninput="scheduleDailySave()"></textarea>
          <label class="fld danger" style="margin-top:12px">막힌 것 (사장에게 표시)</label>
          <textarea id="blocker-input" class="ta" placeholder="지금 막힌 것이 있으면 (없으면 비워두기)" oninput="scheduleDailySave()"></textarea>
        </div>
        <div class="soft-card" style="margin-top:12px">
          <label class="fld">내일 계획 — 자세히</label>
          <div id="carry-preview"></div>
          <textarea id="tomorrow-detail" class="ta" placeholder="내일 무엇을 · 언제 · 왜 (자세히 적어두면 내일 아침 그대로 이어져요)" style="height:70px" oninput="scheduleDailySave()"></textarea>
          <label class="fld" style="margin-top:12px">내일 할 일 목록</label>
          <div id="tomorrow-slots"></div>
          <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="addTomorrowTask()">＋ 내일 할 일 추가</button>
        </div>
      </div>
      <div id="miss-check" style="margin-top:14px"></div>
    `;
    await runCarryover(uid, dateStr);
    await loadTodayTasks(uid, dateStr);
    await loadDailyReport(uid, dateStr);
    loadRoutinesChecklist(uid,'routines-box',dateStr);
    refreshMode(uid, dateStr);
  }

  // ── 자동 이월: 이전 마지막 근무일의 미완 → 오늘(원본 보존, 중복 방지) ──
  async function runCarryover(uid, dateStr){
    const dref=doc(db,"daily",`${uid}_${dateStr}`);
    const dsnap=await getDoc(dref);
    if(dsnap.exists() && dsnap.data().carryDone) return;
    const all=await getDocs(query(collection(db,"slots"),where("uid","==",uid)));
    const byDate={}; const todayTitles=[];
    all.forEach(d=>{ const s=d.data(); if(!s.date) return; if(s.date===dateStr){ if(s.title) todayTitles.push(s.title.trim()); } else if(s.date<dateStr){ (byDate[s.date]=byDate[s.date]||[]).push(s); } });
    const prev=Object.keys(byDate).sort().reverse();
    if(!prev.length){ await setDoc(dref,{uid,date:dateStr,carryDone:'none',updatedAt:Timestamp.now()},{merge:true}); return; }
    const src=prev[0];
    const undone=byDate[src].filter(s=>s.title && s.status!=='done');
    const writes=[];
    for(const s of undone){
      if(todayTitles.includes((s.title||'').trim())) continue;
      const id=`${uid}_${dateStr}_${newKey()}`;
      writes.push(setDoc(doc(db,"slots",id),{ uid, date:dateStr, title:s.title, status:'todo', important:!!s.important, plannedTime:s.plannedTime||s.hour||'', links:s.links||[], carriedFrom:src, weekStart:weekStart(new Date(dateStr)), updatedAt:Timestamp.now() }));
    }
    writes.push(setDoc(dref,{uid,date:dateStr,carryDone:src,updatedAt:Timestamp.now()},{merge:true}));
    await Promise.all(writes);
  }

  // ── 오늘 할 일 로드/렌더 ──
  async function loadTodayTasks(uid, dateStr){
    const snap=await getDocs(query(collection(db,"slots"),where("uid","==",uid),where("date","==",dateStr)));
    todayTasks=[]; snap.forEach(d=>todayTasks.push({id:d.id, ...d.data()}));
    renderTaskList(uid);
    syncGoals(uid);
  }
  function sortTasks(a,b){
    if(!!b.important - !!a.important) return (!!b.important)-(!!a.important);
    const ta=a.plannedTime||a.hour||'99:99', tb=b.plannedTime||b.hour||'99:99';
    if(ta!==tb) return ta.localeCompare(tb);
    return (a.updatedAt?.seconds||0)-(b.updatedAt?.seconds||0);
  }
  function renderTaskList(uid){
    const box=$('task-list'); if(!box) return;
    if(!todayTasks.length){ box.innerHTML='<div class="empty">아직 오늘 할 일이 없어요. 아래에 한 줄 적어보세요.</div>'; updateMissCheck(); return; }
    const arr=[...todayTasks].sort(sortTasks);
    box.innerHTML='';
    arr.forEach(t=>{
      const st=t.status==='skip'?'todo':(t.status||'todo');
      const carried=!!t.carriedFrom;
      const row=el('div','task-row'+(t.important?' task-important':'')+(carried?' carry-item':'')+(st==='done'?' task-done':''));
      const seg=(s,lbl,cls)=>`<button class="seg ${st===s?'on '+cls:''}" onclick="setTaskStatus('${uid}','${t.id}','${s}')">${lbl}</button>`;
      row.innerHTML=`
        <span class="star" onclick="toggleImportant('${uid}','${t.id}')" title="중요 표시">${t.important?'★':'☆'}</span>
        <div class="task-main">
          <div class="task-title">${esc(t.title)}${carried?' <span class="pill pill-carry">이월</span>':''}${t.needsHelp&&!t.helpResolved?' <span class="pill pill-help">도움요청</span>':''}</div>
          ${(t.plannedTime||t.hour)?`<span class="task-meta">${t.plannedTime||t.hour}</span>`:''}
          ${(t.links||[]).length?`<div class="task-links">${linkPills(t.links)}</div>`:''}
          ${t.bossComment?`<div class="boss-inline">👑 ${esc(t.bossComment)}</div>`:''}
        </div>
        <div class="seg-group">${seg('done','완료','seg-done')}${seg('wip','진행','seg-wip')}${seg('todo','못함','seg-todo')}</div>
        <span class="more" onclick="openTaskDetail('${uid}','${t.id}')" title="상세">⋯</span>`;
      box.appendChild(row);
    });
    updateMissCheck();
  }

  window.addTask = async (uid) => {
    const inp=$('new-task'); const title=(inp?.value||'').trim(); if(!title) return;
    const id=`${uid}_${today()}_${newKey()}`;
    const payload={ uid, date:today(), title, status:'todo', important:false, weekStart:weekStart(new Date()), updatedAt:Timestamp.now() };
    await setDoc(doc(db,"slots",id), payload, {merge:true});
    todayTasks.push({id, ...payload}); inp.value=''; renderTaskList(uid); inp.focus();
  };
  window.setTaskStatus = async (uid, id, status) => {
    const t=todayTasks.find(x=>x.id===id); if(!t) return;
    t.status=status; renderTaskList(uid);
    await setDoc(doc(db,"slots",id),{status,updatedAt:Timestamp.now()},{merge:true});
    syncGoals(uid);
  };
  window.toggleImportant = async (uid, id) => {
    const t=todayTasks.find(x=>x.id===id); if(!t) return;
    if(!t.important && todayTasks.filter(x=>x.important).length>=3){ alert('중요 표시는 최대 3개까지예요.'); return; }
    t.important=!t.important; renderTaskList(uid);
    await setDoc(doc(db,"slots",id),{important:t.important,updatedAt:Timestamp.now()},{merge:true});
    syncGoals(uid);
  };
  window.deleteTask = async (uid, id) => {
    if(!confirm('이 항목을 삭제할까요?')) return;
    await deleteDoc(doc(db,"slots",id)); todayTasks=todayTasks.filter(x=>x.id!==id); renderTaskList(uid); syncGoals(uid); closeModal();
  };
  // 중요표시 → daily.topGoals 미러(관리자 화면 호환)
  async function syncGoals(uid){
    const goals=todayTasks.filter(t=>t.important).map(t=>({text:t.title, done:t.status==='done'}));
    try{ await setDoc(doc(db,"daily",`${uid}_${today()}`),{uid,date:today(),topGoals:goals,updatedAt:Timestamp.now()},{merge:true}); }catch(e){}
    updateMissCheck();
  }

  // ── 링크/도움 ──
  const linkPills = (links) => (links||[]).filter(l=>isValidUrl(l.url)).map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener noreferrer" class="linkpill">🔗 ${esc(l.label||'링크')}</a>`).join('');
  window.addLinkRow = (label='', url='') => {
    const box=$('s-links'); if(!box) return;
    const row=el('div','link-edit');
    row.innerHTML=`<input class="mini-input link-label" placeholder="이름" style="width:110px" value="${esc(label)}"><input class="mini-input link-url" placeholder="https://..." value="${esc(url)}"><button type="button" onclick="this.parentElement.remove()" class="xbtn">✕</button>`;
    box.appendChild(row);
  };

  // ── 오늘 항목 상세 모달(시간·메모·링크·도움·삭제) ──
  window.openTaskDetail = (uid, id) => {
    const t=todayTasks.find(x=>x.id===id); if(!t) return;
    showModal(`
      <div class="modal-title">항목 상세</div>
      <div class="form-group"><label>제목</label><input id="d-title" class="mini-input" style="width:100%" value="${esc(t.title)}"></div>
      <div class="form-group"><label>예정 시간 (선택)</label><input id="d-time" type="time" class="mini-input" value="${t.plannedTime||t.hour||''}"></div>
      <div class="form-group"><label>메모 (선택)</label><textarea id="d-memo" class="ta">${esc(t.memo)}</textarea></div>

      let selStatus=d.status||'todo';
      document.querySelectorAll('.modal-seg .seg').forEach(b=>{ if(b.dataset.s===selStatus) b.classList.add('on','seg-'+selStatus); b.addEventListener('click',()=>{ selStatus=b.dataset.s; document.querySelectorAll('.modal-seg .seg').forEach(x=>x.className='seg'); b.classList.add('on','seg-'+selStatus); }); });
      (d.links||[]).forEach(l=>addLinkRow(l.label,l.url)); if(!(d.links&&d.links.length)) addLinkRow();
      $('slot-save').onclick=async()=>{ const title=$('s-title').value.trim(); if(!title){alert('업무 내용을 입력하세요');return;}
        const links=[...document.querySelectorAll('#s-links .link-edit')].map(r=>({label:r.querySelector('.link-label').value.trim(),url:r.querySelector('.link-url').value.trim()})).filter(l=>isValidUrl(l.url));
        const payload={uid,date,hour,plannedTime:hour,title,status:selStatus,memo:$('s-memo').value.trim(),links,weekStart:weekStart(new Date(date)),updatedAt:Timestamp.now()};
        if($('s-help')){ payload.needsHelp=$('s-help').checked; payload.helpNote=$('s-help-note').value.trim(); }
        if($('s-comment')) payload.bossComment=$('s-comment').value.trim();
        await setDoc(doc(db,"slots",slotId),payload,{merge:true});
        renderCellContent(cellEl,payload); closeModal();
        if(isOwner && date===today() && $('task-list')) loadTodayTasks(uid,today());
      };
      if($('slot-del')) $('slot-del').onclick=async()=>{ if(!confirm('삭제할까요?'))return; await deleteDoc(doc(db,"slots",slotId)); renderCellContent(cellEl,null); closeModal(); if(date===today()&&$('task-list')) loadTodayTasks(uid,today()); };
    });
  }

  // ── 지난 기록 ──
  async function renderHistory(uid, containerId){
    const box=$(containerId); if(!box) return;
    box.innerHTML='<div class="sec-title" style="margin-bottom:10px">지난 기록 <span class="muted">· 최근순 · 최대 3개월</span></div><div class="muted">불러오는 중...</div>';
    const snap=await getDocs(query(collection(db,"daily"),where("uid","==",uid)));
    const days=[]; snap.forEach(d=>days.push(d.data())); days.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    box.innerHTML='<div class="sec-title" style="margin-bottom:10px">지난 기록 <span class="muted">· 최근순 · 최대 3개월</span></div>';
    if(!days.length){ box.innerHTML+='<div class="empty">아직 기록이 없습니다</div>'; return; }
    const listWrap=el('div','soft-card');
    days.forEach(d=>{ const goals=d.topGoals||[]; const gd=goals.filter(g=>g.done).length;
      const row=el('div','hist-row'); row.onclick=()=>openDayDetail(uid,d.date);
      row.innerHTML=`<span><b>${dateLabel(d.date||'')}</b> <span class="muted">★ ${gd}/${goals.length}${d.clockIn?' · 출근 '+d.clockIn:''}${(d.blocker||'').trim()?' · 🆘':''}</span></span><span class="muted">${d.selfFeedback?esc(d.selfFeedback.slice(0,26)):''} ▸</span>`;
      listWrap.appendChild(row); });
    box.appendChild(listWrap); const detail=el('div'); detail.id='history-detail'; box.appendChild(detail);
  }
  window.openDayDetail = async (uid, date) => {
    const box=$('history-detail'); if(!box) return; box.innerHTML='<div class="muted">불러오는 중...</div>';
    const sn=await getDocs(query(collection(db,"slots"),where("uid","==",uid),where("date","==",date)));
    const slots=[]; sn.forEach(x=>slots.push(x.data())); slots.sort((a,b)=>((a.plannedTime||a.hour||'')+'').localeCompare((b.plannedTime||b.hour||'')+''));
    const dSnap=await getDoc(doc(db,"daily",`${uid}_${date}`)); const dd=dSnap.exists()?dSnap.data():{};
    box.innerHTML=`<div class="soft-card" style="margin-top:12px"><div class="sec-title">${dateLabel(date)} 상세</div>`+
      (slots.length?slots.map(s=>`<div class="task-row static"><div class="task-main"><div class="task-title">${esc(s.title||'')} <span style="color:${SVAR[s.status]}">${STATUS_LABEL[s.status]||''}</span>${s.important?' ★':''}</div>${(s.links||[]).length?`<div class="task-links">${linkPills(s.links)}</div>`:''}</div></div>`).join(''):'<div class="empty">그날 항목 없음</div>')+
      `<div class="fld" style="margin-top:12px">중요 업무</div><div class="fbox">${(dd.topGoals||[]).map(g=>`${g.done?'✅':'⬜'} ${esc(g.text)}`).join('<br>')||'(없음)'}</div>`+
      `<div class="fld" style="margin-top:12px">자체 피드백</div><div class="fbox">${esc(dd.selfFeedback)||'(없음)'}</div>`+
      (dd.improve?`<div class="fld" style="margin-top:12px">배운 점/개선점</div><div class="fbox">${esc(dd.improve)}</div>`:'')+
      (dd.tomorrowDetail?`<div class="fld" style="margin-top:12px">내일 계획</div><div class="fbox">${esc(dd.tomorrowDetail)}</div>`:'')+`</div>`;
  };
  window.bossShowHistory = (uid) => renderHistory(uid,'boss-history-wrap');

  // ══════════════════════════════════════
  //  관리자 뷰
  // ══════════════════════════════════════
  async function renderBossView(){
    if($('sidebar')) $('sidebar').style.display='';
    const main=$('main-content'); main.innerHTML='<div class="muted" style="padding:40px">직원 목록 불러오는 중...</div>';
    const snap=await getDocs(query(collection(db,"users"),where("role","==","staff")));
    const staffList=[]; snap.forEach(d=>staffList.push({uid:d.id,...d.data()}));
    const sidebar=$('sidebar'); sidebar.innerHTML='<div class="sidebar-section">직원 목록</div>';
    const dateStr=today();
    for(const s of staffList){
      const sn=await getDocs(query(collection(db,"slots"),where("uid","==",s.uid),where("date","==",dateStr)));
      const item=el('div','staff-item'); item.dataset.uid=s.uid;
      item.innerHTML=`<div class="staff-avatar" style="background:${s.color||'#4f6bed'}">${(s.displayName||'?')[0]}</div><div class="staff-name">${s.displayName||s.email}</div><div class="staff-status ${sn.empty?'status-none':'status-ok'}"></div>`;
      item.addEventListener('click',()=>selectStaff(s,staffList)); sidebar.appendChild(item);
    }
    const all=el('div','view-all','📊 팀 전체 보기'); all.addEventListener('click',()=>renderTeamOverview(staffList)); sidebar.appendChild(all);
    if(staffList.length>0) selectStaff(staffList[0],staffList); else main.innerHTML='<div class="empty">등록된 직원이 없습니다</div>';
  }
  let _curStaff=null;
  function selectStaff(s, staffList){ selectedStaffUid=s.uid; document.querySelectorAll('.staff-item').forEach(i=>i.classList.toggle('active',i.dataset.uid===s.uid)); renderBossStaffDetail(s); }
  function renderBossStaffDetail(s){
    _curStaff=s;
    unsubListeners.forEach(u=>u()); unsubListeners=[]; const main=$('main-content');
    main.innerHTML=`
      <div class="page-header">
        <div class="row" style="gap:12px"><div class="staff-header-avatar" style="background:${s.color||'#4f6bed'}">${(s.displayName||'?')[0]}</div><div><div class="page-title">${s.displayName||s.email}</div><div class="page-sub" id="staff-meta">로딩 중...</div></div></div>
        <div class="row" style="gap:8px">
          <button class="btn btn-ghost" onclick="openAddTaskModal('${s.uid}','${esc(s.displayName||s.email)}')">＋ 업무 배정</button>
          <button class="btn btn-ghost" onclick="openRoutineManager('${s.uid}')">필수 업무</button>
          <button class="btn btn-primary" onclick="openBossCommentModal('${s.uid}','${esc(s.displayName||s.email)}')">지시 보내기</button>
          <button class="btn btn-ghost" onclick="bossShowHistory('${s.uid}')">지난 기록</button>
        </div>
      </div>
      <div id="boss-history-wrap"></div>
      <div class="two-col" style="margin-top:8px"><div id="boss-today-slots"></div><div id="boss-feedback-wrap"></div></div>
      <div id="boss-week-wrap" style="margin-top:20px"></div>`;
    loadBossTodayView(s);
    renderWeekTimetable(s.uid,'boss-week-wrap',hoursRange(s.workStart,s.workEnd));
  }
  async function loadBossTodayView(s){
    const dateStr=today(); const slotsQ=query(collection(db,"slots"),where("uid","==",s.uid),where("date","==",dateStr)); const dailyRef=doc(db,"daily",`${s.uid}_${dateStr}`);
    const sn=await getDocs(slotsQ); let done=0,total=0; const slots=[]; sn.forEach(d=>{const sd=d.data(); slots.push({id:d.id,...sd}); total++; if(sd.status==='done')done++;});
    slots.sort(sortTasks);
    const md=(await getDoc(dailyRef)).data()||{};
    const mli=lateInfo(md.clockIn,s.workStart);
    const att=md.clockIn?`출근 ${md.clockIn}${mli.late?` · 지각 ${mli.mins}분`:' · 정상'}${md.clockOut?` · 퇴근 ${md.clockOut}`:''}`:'미출근';
    let rtTxt=''; try{ const rSnap=await getDocs(collection(db,"routines")); let rTot=0,rDone=0; const ds=new Set(md.routinesDone||[]); rSnap.forEach(r=>{const d=r.data(); if(d.active!==false&&(d.targetUid==='all'||d.targetUid===s.uid)){rTot++; if(ds.has(r.id))rDone++;}}); if(rTot>0) rtTxt=` · 필수업무 ${rDone}/${rTot}`; }catch(e){}
    const meta=$('staff-meta'); if(meta) meta.textContent=`오늘 완료 ${done}/${total}${rtTxt} · ${att}`;
    const wrap=$('boss-today-slots');
    if(wrap){ wrap.innerHTML='<div class="soft-card"><div class="sec-title">오늘 할 일</div>'+
      (slots.length?slots.map(sl=>`<div class="task-row static ${sl.status==='done'?'task-done':''}">
        <span class="star">${sl.important?'★':''}</span>
        <div class="task-main"><div class="task-title">${esc(sl.title)}${sl.carriedFrom?' <span class="pill pill-carry">이월</span>':''}${sl.needsHelp&&!sl.helpResolved?' <span class="pill pill-help">도움요청</span>':''}</div>${(sl.plannedTime||sl.hour)?`<span class="task-meta">${sl.plannedTime||sl.hour}</span>`:''}${sl.memo?`<div class="task-meta">${esc(sl.memo)}</div>`:''}${sl.helpNote&&sl.needsHelp?`<div class="help-note">🆘 ${esc(sl.helpNote)}</div>`:''}${(sl.links||[]).length?`<div class="task-links">${linkPills(sl.links)}</div>`:''}</div>
        <span class="badge" style="color:${SVAR[sl.status]}">${STATUS_LABEL[sl.status]||''}</span>
        <div class="row" style="gap:4px;margin-left:6px"><button class="btn-sm btn-approve" onclick="approveSlot('${sl.id}',true)">승인</button><button class="btn-sm btn-return" onclick="approveSlot('${sl.id}',false)">반려</button></div>
      </div>`).join(''):'<div class="empty">오늘 항목 없음</div>')+'</div>';
    }
    const dData=(await getDoc(dailyRef)).data()||{};
    const fb=$('boss-feedback-wrap');
    if(fb){ fb.innerHTML=`<div class="soft-card">
      <div class="sec-title">중요 업무</div><div class="fbox">${(dData.topGoals||[]).map(g=>`${g.done?'✅':'⬜'} ${esc(g.text)}`).join('<br>')||'(아직 없음)'}</div>
      ${(dData.blocker||'').trim()?`<div class="fld danger" style="margin-top:14px">막힌 것 (도움요청)</div><div class="fbox danger">${esc(dData.blocker)}</div>`:''}
      <div class="fld" style="margin-top:14px">자체 피드백</div><div class="fbox">${esc(dData.selfFeedback)||'(아직 입력하지 않음)'}</div>
      ${dData.improve?`<div class="fld" style="margin-top:14px">배운 점/개선점</div><div class="fbox">${esc(dData.improve)}</div>`:''}
      <div class="fld" style="margin-top:14px">내일 계획</div><div class="fbox">${esc(dData.tomorrowDetail)||(dData.tomorrowTasks||[]).map((t,i)=>`${i+1}. ${esc(t)}`).join('<br>')||'(아직 입력하지 않음)'}</div>
      <div class="fld" style="margin-top:14px">관리자 코멘트</div><textarea id="boss-comment-input" class="ta" placeholder="직원에게 코멘트">${esc(dData.bossComment)}</textarea>
      <div style="text-align:right;margin-top:8px"><button class="btn btn-primary" onclick="saveBossComment('${s.uid}','${dateStr}')">코멘트 저장</button></div></div>`;
    }
  }
  window.approveSlot = async (slotId, approved) => {
    let reason=''; if(!approved){ reason=(prompt('반려 사유를 입력하세요 (직원에게 전달)')||'').trim(); if(!reason){ alert('반려하려면 사유가 필요합니다.'); return; } }
    const payload={approved,approvedAt:Timestamp.now(),approvedBy:currentUser.uid}; if(!approved) payload.bossComment='[반려] '+reason;
    await setDoc(doc(db,"slots",slotId),payload,{merge:true}); alert(approved?'승인했습니다.':'반려했습니다.');
  };
  window.saveBossComment = async (uid, dateStr) => { const c=$('boss-comment-input')?.value.trim()||''; await setDoc(doc(db,"daily",`${uid}_${dateStr}`),{bossComment:c,bossCommentAt:Timestamp.now()},{merge:true}); alert('코멘트가 저장되었습니다.'); };
  window.openAddTaskModal = (uid,name) => {
    const t=new Date(); t.setDate(t.getDate()+1); const tStr=t.toISOString().slice(0,10);
    showModal(`<div class="modal-title">업무 배정 — ${name}</div>
      <div class="form-group"><label>날짜</label><input id="at-date" type="date" class="mini-input" style="width:100%" value="${tStr}"></div>
      <div class="form-group"><label>예정 시간 (선택)</label><input id="at-time" type="time" class="mini-input" style="width:100%"></div>
      <div class="form-group"><label>업무 내용</label><input id="at-title" class="mini-input" style="width:100%" placeholder="업무 내용"></div>
      <div class="form-group"><label>메모 (선택)</label><textarea id="at-memo" class="ta" placeholder="상세 지시사항"></textarea></div>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="saveAddedTask('${uid}')">배정</button></div>`);
  };
  window.saveAddedTask = async (uid) => {
    const date=$('at-date').value, time=$('at-time').value, title=$('at-title').value.trim(), memo=$('at-memo').value.trim();
    if(!title){ alert('업무 내용을 입력하세요'); return; }
    const id=`${uid}_${date}_${newKey()}`;
    await setDoc(doc(db,"slots",id),{uid,date,plannedTime:time||'',title,memo,status:'todo',important:false,weekStart:weekStart(new Date(date)),assignedBy:currentUser.uid,updatedAt:Timestamp.now()},{merge:true});
    closeModal(); alert('업무가 배정되었습니다.'); if(_curStaff && _curStaff.uid===uid) renderBossStaffDetail(_curStaff);
  };
  window.openBossCommentModal = (uid,name) => {
    showModal(`<div class="modal-title">지시 보내기 — ${name}</div><div class="form-group"><label>지시 내용</label><textarea id="direct-msg" class="ta" style="height:120px" placeholder="직원에게 전달할 지시사항"></textarea></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="sendDirectMessage('${uid}')">전송</button></div>`);
  };
  window.sendDirectMessage = async (uid) => { const msg=$('direct-msg')?.value.trim()||''; if(!msg){ alert('내용을 입력하세요'); return; } await setDoc(doc(db,"daily",`${uid}_${today()}`),{bossComment:msg,bossCommentAt:Timestamp.now(),bossCommentBy:currentUser.uid},{merge:true}); closeModal(); alert('지시가 전달되었습니다.'); };

  async function renderTeamOverview(staffList){
    document.querySelectorAll('.staff-item').forEach(i=>i.classList.remove('active'));
    const main=$('main-content'); const dateStr=today();
    main.innerHTML=`<div class="page-header"><div class="page-title">팀 전체 현황 <span class="muted">· ${dateLabel(dateStr)}</span></div></div><div id="team-alerts"></div><div id="team-banner"></div><div class="team-grid" id="team-grid"></div>`;
    const grid=$('team-grid'); const blockers=[],helps=[],alerts=[];
    for(const s of staffList){
      const sn=await getDocs(query(collection(db,"slots"),where("uid","==",s.uid),where("date","==",dateStr)));
      let done=0,wip=0,undone=0; sn.forEach(d=>{const sd=d.data(); const st=sd.status; if(st==='done')done++; else if(st==='wip')wip++; else undone++; if(sd.needsHelp&&!sd.helpResolved) helps.push({name:s.displayName||s.email,title:sd.title||''});});
      const total=done+wip+undone; const pct=total>0?Math.round(done/total*100):0; const pc=pct>=80?'var(--success)':pct>=50?'var(--warn)':'var(--danger)';
      const dd=(await getDoc(doc(db,"daily",`${s.uid}_${dateStr}`))).data()||{};
      const feedback=dd.selfFeedback||''; const li=lateInfo(dd.clockIn,s.workStart); const goals=dd.topGoals||[]; const goalsDone=goals.filter(g=>g.done).length; const blocker=(dd.blocker||'').trim();
      if(blocker&&!dd.blockerResolved) blockers.push({name:s.displayName||s.email,text:blocker});
      const anom=[]; if(dd.clockIn&&total===0) anom.push('출근했으나 업무 미기록');
      const anyMemo=sn.docs.some(x=>(x.data().memo||'').trim());
      if(total>0&&done===total&&!anyMemo&&!feedback.trim()) anom.push('전부 완료·근거 없음');
      try{ const dAll=await getDocs(query(collection(db,"daily"),where("uid","==",s.uid))); const da=[]; dAll.forEach(x=>da.push(x.data())); da.sort((a,b)=>(b.date||'').localeCompare(a.date||'')); const r3=da.slice(0,3); if(r3.length>=3&&r3.every(day=>{const g=day.topGoals||[]; return g.length===0||g.filter(x=>x.done).length<g.length;})) anom.push('목표 3일 연속 미달'); }catch(e){}
      anom.forEach(a=>alerts.push({name:s.displayName||s.email,text:a}));
      const att=dd.clockIn?`출근 ${dd.clockIn} · ${li.late?`<span class="late">지각 ${li.mins}분</span>`:'<span class="ontime">정상</span>'}${dd.clockOut?` · 퇴근 ${dd.clockOut}`:''}`:'<span class="muted">미출근</span>';
      const card=el('div','team-card');
      card.innerHTML=`<div class="team-card-header"><div class="staff-avatar" style="background:${s.color||'#4f6bed'}">${(s.displayName||'?')[0]}</div><div><div class="team-name">${s.displayName||s.email}</div><div class="muted" style="font-size:11px">${att}</div></div><div class="team-pct" style="color:${pc}">${pct}%</div></div>
        <div class="progress-bar"><div style="width:${pct}%;background:${pc}"></div></div>
        <div class="team-stats"><span class="ontime">완료 ${done}</span><span style="color:var(--warn)">진행 ${wip}</span><span class="muted">미완 ${undone}</span><span style="margin-left:auto;color:var(--accent-text)">★ ${goalsDone}/${goals.length}</span></div>
        ${blocker?`<div class="team-alert danger">🚨 ${esc(blocker)}</div>`:''}
        ${anom.length?`<div class="team-alert warn">⚠️ ${esc(anom.join(' · '))}</div>`:''}
        ${feedback?`<div class="team-feedback">"${esc(feedback.slice(0,80))}${feedback.length>80?'…':''}"</div>`:'<div class="team-feedback muted">아직 피드백 없음</div>'}
        <button class="btn btn-ghost" style="width:100%;margin-top:10px" onclick="event.stopPropagation()">상세 보기 →</button>`;
      card.querySelector('button').addEventListener('click',()=>selectStaff(s,staffList)); grid.appendChild(card);
    }
    const aw=$('team-alerts'); if(aw&&alerts.length) aw.innerHTML=`<div class="banner warn"><b>⚠️ 주목 ${alerts.length}건</b> · ${alerts.map(a=>esc(`${a.name}: ${a.text}`)).join(' · ')}</div>`;
    const bw=$('team-banner'); const items=[]; blockers.forEach(b=>items.push(`${b.name} (${b.text})`)); helps.forEach(h=>items.push(`${h.name} — ${h.title}`));
    if(bw&&items.length) bw.innerHTML=`<div class="banner danger"><b>🆘 도움요청 ${items.length}건</b> · ${items.map(esc).join(' · ')}</div>`;
  }

  // ── 모달 ──
  window.showModal = (html) => { $('modal-body').innerHTML=html; $('modal-overlay').style.display='flex'; };
  window.closeModal = () => { $('modal-overlay').style.display='none'; };
  $('modal-overlay')?.addEventListener('click',e=>{ if(e.target===$('modal-overlay')) closeModal(); });
</script>

<style>
:root{
  --bg:#f4f6fa; --surface:#ffffff; --surface-2:#f7f8fb; --soft:#fbfcfe;
  --border:#e6e9f0; --border-strong:#d5dae4;
  --text:#1f2430; --text-2:#5b6472; --text-3:#98a0ae;
  --accent:#4f6bed; --accent-bg:#eef1fd; --accent-text:#3a4fc4;
  --success:#16a34a; --success-bg:#e8f7ee;
  --warn:#d97706; --warn-bg:#fdf3e3;
  --danger:#dc2626; --danger-bg:#fdecec;
  --important:#f59e0b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes starPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.28)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-9px)}to{opacity:1;transform:translateX(0)}}

/* 로그인 */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:360px;box-shadow:0 6px 24px rgba(30,40,80,.06);}
.login-logo{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-0.5px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:13px;color:var(--text-3);margin-bottom:28px;}
.login-label{font-size:12px;color:var(--text-2);font-weight:600;margin-bottom:6px;display:block;}
.login-input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:10px 12px;outline:none;margin-bottom:12px;}
.login-input:focus{border-color:var(--accent);background:#fff;}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
.login-btn:hover{background:#3f5bd8;}
.login-err{font-size:12px;color:var(--danger);margin-top:10px;min-height:18px;}

/* 앱 레이아웃 */
#app-screen{display:none;flex-direction:column;height:100vh;}
.top-nav{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:54px;flex-shrink:0;}
.nav-logo{font-size:16px;font-weight:800;color:var(--text);margin-right:24px;letter-spacing:-0.3px;}
.nav-logo span{color:var(--accent);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.role-badge{background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font-size:11px;padding:4px 11px;border-radius:20px;font-weight:600;}
.role-badge.boss{color:var(--warn);border-color:#f0c98a;background:var(--warn-bg);}
.user-name{font-size:13px;color:var(--text-2);}
.logout-btn{font-size:12px;color:var(--text-3);cursor:pointer;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;}
.logout-btn:hover{color:var(--danger);border-color:var(--danger);}
.app-body{display:flex;flex:1;overflow:hidden;}

/* 사이드바 */
#sidebar{width:196px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:14px 0;flex-shrink:0;}
.sidebar-section{font-size:10px;font-weight:700;color:var(--text-3);padding:0 16px 8px;letter-spacing:1.2px;text-transform:uppercase;}
.staff-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;transition:background .12s;}
.staff-item:hover,.staff-item.active{background:var(--accent-bg);}
.staff-item.active .staff-name{color:var(--accent-text);font-weight:600;}
.staff-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.staff-name{font-size:13px;color:var(--text-2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.staff-status{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-ok{background:var(--success);}.status-none{background:var(--border-strong);}
.view-all{display:flex;align-items:center;gap:8px;padding:11px 16px;cursor:pointer;font-size:13px;color:var(--accent);border-top:1px solid var(--border);margin-top:8px;font-weight:600;}
.view-all:hover{background:var(--accent-bg);}

/* 메인 */
#main-content{flex:1;overflow-y:auto;padding:22px 26px;max-width:920px;margin:0 auto;width:100%;}
.muted{color:var(--text-3);font-size:12px;}
.empty{color:var(--text-3);padding:22px;text-align:center;background:var(--surface);border-radius:10px;border:1px dashed var(--border-strong);font-size:13px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:19px;font-weight:800;color:var(--text);letter-spacing:-0.3px;}
.page-sub{font-size:12px;color:var(--text-3);margin-top:3px;}
.staff-header-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;}
.row{display:flex;align-items:center;}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 10px;}
.sec-title{font-size:14px;font-weight:700;color:var(--text);}
.fld{font-size:12px;font-weight:600;color:var(--text-2);display:block;}
.fld.danger{color:var(--danger);}
.link-btn{font-size:12px;color:var(--accent);cursor:pointer;white-space:nowrap;}
.link-btn:hover{text-decoration:underline;}

/* 탭 */
.tabbar{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;}
.tabbtn{border:none;background:transparent;color:var(--text-2);font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;}
.tabbtn.active{background:var(--accent);color:#fff;}

/* 카드 */
.soft-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:0 1px 2px rgba(30,40,80,.03);}
.clock-line{font-size:13px;color:var(--text);}
.late{color:var(--warn);font-weight:700;}
.ontime{color:var(--success);font-weight:600;}
.mini-input{background:var(--surface-2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:8px 10px;outline:none;}
.mini-input:focus{border-color:var(--accent);background:#fff;}
.ta{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px 12px;outline:none;resize:vertical;height:64px;font-family:inherit;line-height:1.6;}
.ta:focus{border-color:var(--accent);background:#fff;}

/* 모드 배너 */
.mode{display:flex;align-items:center;gap:12px;border-radius:12px;padding:12px 15px;margin-bottom:14px;animation:slideIn .4s ease both;}
.mode-am{background:var(--accent-bg);}
.mode-pm{background:var(--success-bg);}
.mode .mi{font-size:20px;font-style:normal;}
.mode-am .mt{color:var(--accent-text);font-weight:700;font-size:14px;}
.mode-am .ms{color:#5566cc;font-size:12px;margin-top:2px;}
.mode-pm .mt{color:#15803d;font-weight:700;font-size:14px;}
.mode-pm .ms{color:#3f9d63;font-size:12px;margin-top:2px;}

/* 오늘 할 일 리스트 */
#task-list{display:flex;flex-direction:column;gap:0;}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:box-shadow .12s;}
.task-row:hover{box-shadow:0 2px 8px rgba(30,40,80,.06);}
.task-row.static{cursor:default;}
.task-row.carry-item{background:var(--warn-bg);border-color:#f0d9a8;animation:slideIn .45s ease both;}
.task-row.task-done{opacity:.72;}
.task-row.task-done .task-title{text-decoration:line-through;color:var(--text-3);}
.star{font-size:17px;color:var(--text-3);cursor:pointer;flex-shrink:0;line-height:1.4;user-select:none;}
.task-important .star{color:var(--important);animation:starPulse 1.9s ease-in-out infinite;}
.task-main{flex:1;min-width:0;}
.task-title{font-size:14px;color:var(--text);line-height:1.45;}
.task-meta{font-size:11.5px;color:var(--text-3);margin-top:2px;display:inline-block;}
.task-links{margin-top:5px;}
.help-note{font-size:11.5px;color:var(--warn);margin-top:3px;}
.boss-inline{font-size:12px;color:var(--accent-text);background:var(--accent-bg);border-radius:6px;padding:4px 8px;margin-top:5px;}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;vertical-align:1px;}
.pill-carry{background:#f6e3c0;color:#92600d;}
.pill-help{background:var(--danger-bg);color:var(--danger);}
.seg-group{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0;}
.seg{border:none;background:var(--surface);color:var(--text-3);font-size:11.5px;font-weight:600;padding:5px 9px;cursor:pointer;border-left:1px solid var(--border);}
.seg:first-child{border-left:none;}
.seg.on.seg-done{background:var(--success);color:#fff;}
.seg.on.seg-wip{background:var(--warn);color:#fff;}
.seg.on.seg-todo{background:#64748b;color:#fff;}
.more{font-size:18px;color:var(--text-3);cursor:pointer;flex-shrink:0;padding:0 2px;line-height:1;}
.more:hover{color:var(--text);}
.badge{font-size:12px;font-weight:600;flex-shrink:0;}

.add-row{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px 10px;margin-top:2px;}
.add-plus{color:var(--text-3);font-style:normal;font-size:16px;}
.add-input{flex:1;border:none;background:transparent;outline:none;font-size:14px;color:var(--text);padding:6px 0;}

/* 마무리 */
.wrap-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:16px;font-size:14px;font-weight:600;color:var(--text);}
.wrap-toggle i{font-style:normal;color:var(--text-3);margin-right:4px;}
.tmr-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.xbtn{background:transparent;border:none;color:var(--text-3);cursor:pointer;font-size:14px;}
.xbtn:hover{color:var(--danger);}
.miss{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.miss-t{font-size:12px;font-weight:700;color:var(--text-2);}
.chip{display:inline-block;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--surface-2);color:var(--text-2);margin:2px 0;}
.chip-ok{background:var(--success-bg);color:#15803d;}
.chip-bad{background:var(--danger-bg);color:var(--danger);}

/* 필수업무 */
.rt-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.rt-row:last-child{border-bottom:none;}
.rt-check{width:20px;height:20px;border-radius:6px;border:1.6px solid var(--border-strong);display:inline-flex;align-items:center;justify-content:center;font-size:13px;color:var(--success);cursor:pointer;flex-shrink:0;background:#fff;}
.rt-check.on{background:var(--success-bg);border-color:var(--success);}
.rt-title{font-size:13.5px;font-weight:600;color:var(--text);}
.rt-title.done{color:var(--text-3);text-decoration:line-through;}
.rt-guide{margin-top:6px;background:var(--accent-bg);border:1px solid #cdd7f7;border-radius:8px;padding:8px 10px;font-size:12px;color:var(--accent-text);line-height:1.7;white-space:pre-wrap;}
.linkpill{display:inline-flex;align-items:center;gap:4px;background:var(--accent-bg);border:1px solid #d3ddf8;color:var(--accent-text);border-radius:20px;padding:2px 9px;font-size:11px;text-decoration:none;margin:3px 4px 0 0;}
.link-edit{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.help-box{border:1px solid #f0d9a8;border-radius:8px;padding:10px;background:var(--warn-bg);color:var(--warn);}

/* 주간 그리드 */
.week-grid{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.week-header-row{display:grid;grid-template-columns:56px repeat(5,1fr);border-bottom:1px solid var(--border);}
.time-col-hdr{padding:8px;}
.day-hdr{padding:8px 6px;text-align:center;font-size:12px;font-weight:700;color:var(--text-2);border-left:1px solid var(--border);line-height:1.4;}
.day-hdr.today{color:var(--accent);background:var(--accent-bg);}
.day-date{font-size:10px;font-weight:400;color:var(--text-3);}
.week-row{display:grid;grid-template-columns:56px repeat(5,1fr);border-bottom:1px solid var(--border);}
.week-row:last-child{border-bottom:none;}
.time-col{padding:8px;font-size:11px;color:var(--text-3);display:flex;align-items:center;}
.week-cell{border-left:1px solid var(--border);min-height:50px;padding:4px;cursor:pointer;transition:background .1s;}
.week-cell:hover{background:var(--surface-2);}
.week-cell.today-col{background:#f0f4ff;}
.slot-chip{padding:4px 6px;border-radius:6px;background:var(--surface-2);border-left:3px solid var(--accent);min-height:42px;}
.slot-title{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:2px;}
.slot-status{font-size:10px;font-weight:600;}

/* 지난 기록 */
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;}
.hist-row:last-child{border-bottom:none;}
.hist-row:hover{background:var(--surface-2);}
.fbox{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text-2);line-height:1.7;margin-top:5px;}
.fbox.danger{border-color:#f3c0c0;color:var(--danger);background:var(--danger-bg);}

/* 오늘 상세(관리자) 2열 */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.help-note{font-size:11.5px;color:var(--warn);margin-top:3px;}

/* 폼 */
.form-group{margin-bottom:14px;}
.form-group label{font-size:12px;color:var(--text-2);font-weight:600;display:block;margin-bottom:5px;}

/* 버튼 */
.btn{padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:all .12s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#3f5bd8;}
.btn-ghost{background:var(--surface);color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid #f3c0c0;}
.btn-sm{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;}
.btn-approve{background:var(--success-bg);color:var(--success);border:1px solid #b6e6c8;}
.btn-return{background:var(--danger-bg);color:var(--danger);border:1px solid #f3c0c0;}

/* 팀 */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 1px 2px rgba(30,40,80,.03);}
.team-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.team-name{font-weight:700;color:var(--text);}
.team-pct{margin-left:auto;font-size:20px;font-weight:800;}
.progress-bar{background:var(--surface-2);border-radius:4px;height:6px;overflow:hidden;margin-bottom:10px;}
.progress-bar>div{height:100%;border-radius:4px;transition:width .3s;}
.team-stats{display:flex;gap:12px;font-size:12px;font-weight:600;margin-bottom:8px;}
.team-feedback{font-size:12px;color:var(--text-2);font-style:italic;line-height:1.5;}
.team-alert{font-size:11.5px;font-weight:600;border-radius:6px;padding:5px 8px;margin-top:6px;}
.team-alert.danger{color:var(--danger);background:var(--danger-bg);border:1px solid #f3c0c0;}
.team-alert.warn{color:#92600d;background:var(--warn-bg);border:1px solid #f0d9a8;}
.banner{border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;}
.banner.warn{background:var(--warn-bg);border:1px solid #f0d9a8;color:#92600d;}
.banner.danger{background:var(--danger-bg);border:1px solid #f3c0c0;color:var(--danger);}

/* 모달 */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,40,70,.35);z-index:100;align-items:center;justify-content:center;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 12px 40px rgba(30,40,80,.18);}
.modal-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:18px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--border);}
.modal-seg{display:inline-flex;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Work<span>Board</span></div>
    <div class="login-sub">업무 현황 관리 시스템</div>
    <label class="login-label">아이디</label>
    <input id="login-id" class="login-input" placeholder="아이디 입력" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()">
    <label class="login-label">비밀번호</label>
    <input id="login-pw" class="login-input" type="password" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>

<div id="app-screen">
  <div class="top-nav">
    <div class="nav-logo">Work<span>Board</span></div>
    <div class="nav-right">
      <span class="user-name" id="user-name-badge"></span>
      <div id="role-badge" class="role-badge"></div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="app-body">
    <div id="sidebar"></div>
    <div id="main-content"></div>
  </div>
</div>

<div id="modal-overlay"><div class="modal-box" id="modal-body"></div></div>

</body>
</html>
