<!DOCTYPE html>
<!-- WorkBoard build 2026-07-05a (calendar redesign: sticky-align + overlap + light blocks; comment-history tab; memo image paste; notifications) -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkBoard — 업무 현황판</title>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged,
    updatePassword, reauthenticateWithCredential, EmailAuthProvider }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where,
    getDocs, onSnapshot, orderBy, Timestamp, deleteDoc, addDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDi23uzT0iokcCqU8rURUwSRPikaFALaR4",
    authDomain:        "dailywork-6ceda.firebaseapp.com",
    projectId:         "dailywork-6ceda",
    storageBucket:     "dailywork-6ceda.firebasestorage.app",
    messagingSenderId: "542297301092",
    appId:             "1:542297301092:web:a266a4891a09159087ff71"
  };
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // 텔레그램 — Cloudflare Worker 주소만 넣으면 동작(비었으면 조용히 skip)
  const TG_WORKER_URL = "https://workboard-telegram.내계정.workers.dev";

  // ── 상수 ──
  const DEFAULT_START = "09:00", DEFAULT_END = "18:00";
  const hoursRange = (start=DEFAULT_START, end=DEFAULT_END) => {
    let s = parseInt((start||"").slice(0,2),10), e = parseInt((end||"").slice(0,2),10);
    if (isNaN(s)||isNaN(e)||s<0||e>24||e<=s){ s=9; e=18; }
    const arr=[]; for(let h=s;h<e;h++) arr.push(String(h).padStart(2,"0")+":00"); return arr;
  };
  const HOURS = hoursRange();
  const DAYS  = ["월","화","수","목","금","토","일"];
  const STATUS_LABEL = { done:"완료", wip:"진행중", todo:"미완", skip:"미완" };
  const SVAR = { done:"var(--success)", wip:"var(--warn)", todo:"var(--text-3)", skip:"var(--text-3)" };
  const toMin = t => { const m=/^(\d{1,2}):(\d{2})/.exec(t||""); return m?(+m[1])*60+(+m[2]):null; };
  const nowHM = () => { const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
  const lateInfo = (clockIn, workStart) => {
    const ci=toMin(clockIn), ws=toMin(workStart||DEFAULT_START);
    if(ci==null||ws==null) return {late:false,mins:0};
    return { late: ci>ws, mins: Math.max(0,ci-ws) };
  };

  // 무료 규칙기반 자동정리
  function autoOrganize(text){
    const out={items:[],goals:[],blocker:""};
    if(!text||!text.trim()) return out;
    const segs=text.split(/[\n,;·、]| 그리고 /).map(s=>s.trim()).filter(Boolean);
    for(const seg of segs){
      let hour=null, m=/(\d{1,2}):(\d{2})/.exec(seg);
      if(m) hour=String(+m[1]).padStart(2,"0")+":00";
      else { let h=/(오전|오후)?\s*(\d{1,2})\s*시/.exec(seg); if(h){let hh=+h[2]; if(h[1]==="오후"&&hh<12)hh+=12; if(h[1]==="오전"&&hh===12)hh=0; hour=String(hh).padStart(2,"0")+":00";} }
      let status="todo";
      if(/(막힘|막혔|막혀|대기|블로커|안됨|안 됨|권한\s*없|이슈|문제)/.test(seg)) status="blocker";
      else if(/(완료|했음|했고|끝냄|끝|발송|보냄|보냈|제출|처리함|done)/.test(seg)) status="done";
      else if(/(진행|하는 중|하다|작업 중|작업중|중임|wip)/.test(seg)) status="wip";
      else if(/(예정|할 것|할것|해야|내일|todo|계획)/.test(seg)) status="todo";
      let title=seg.replace(/(\d{1,2}:\d{2})/,"").replace(/(오전|오후)?\s*\d{1,2}\s*시/,"").trim();
      title=title.replace(/(했고|했음|하다가|하다|예정임|예정|막힘|막혔음)$/,"").trim();
      if(!title) title=seg.trim();
      if(status==="blocker") out.blocker = out.blocker ? out.blocker+" / "+title : title;
      else out.items.push({title,status,hour});
    }
    out.goals=out.items.filter(i=>i.status==="todo").slice(0,3).map(i=>i.title);
    return out;
  }

  // ── 상태 ──
  let currentUser=null, userRole=null, userProfile=null, selectedStaffUid=null, unsubListeners=[];
  let todayTasks=[]; // 오늘 슬롯 캐시(직원 오늘 화면)
  let categories=[]; // 주제(카테고리) 목록 캐시
  const collapsedCats=new Set(); // 접힌 주제 그룹
  const expandedSubs=new Set();  // 하위 단계 펼친 항목
  const CAT_COLORS=['#4f6bed','#8b5cf6','#0ea5a4','#d97706','#e0567f','#16a34a','#0284c7','#64748b'];

  // ── 유틸 ──
  const ymd = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;  // 로컬 날짜(타임존 안전)
  const today = () => ymd(new Date());
  const weekStart = (d=new Date()) => { const day=d.getDay()||7; const mon=new Date(d); mon.setDate(d.getDate()-(day-1)); return ymd(mon); };
  const $ = id => document.getElementById(id);
  const el = (tag,cls,html='') => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };
  const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const isValidUrl = u => /^https?:\/\/\S+$/i.test((u||'').trim());
  const newKey = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const dateLabel = (ds) => { const d=new Date(ds+"T00:00:00"); const w=["일","월","화","수","목","금","토"][d.getDay()]; return `${d.getMonth()+1}월 ${d.getDate()}일 (${w})`; };

  // ── 텔레그램 ──
  async function sendTelegram(name, date, summary){
    const text=`📋 WorkBoard 업무 보고\n👤 ${name} — ${date}\n${summary}\n\n🔗 확인: ${location.href}`;
    if(!TG_WORKER_URL||TG_WORKER_URL.includes("내계정")) return;
    try{ await fetch(TG_WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})}); }catch(e){}
  }

  // ── AUTH ──
  onAuthStateChanged(auth, async user => {
    if(user){ currentUser=user; const snap=await getDoc(doc(db,"users",user.uid)); userProfile=snap.data()||{};
      if(userProfile.active===false){ alert('접근이 차단된 계정입니다. 관리자에게 문의하세요.'); currentUser=null; await signOut(auth); return; }
      userRole=userProfile.role||'staff'; showApp(); }
    else { currentUser=null; showLogin(); }
  });
  window.doLogin = async () => {
    const id=$('login-id').value.trim(), pw=$('login-pw').value, err=$('login-err'); err.textContent='';
    if(!id||!pw){ err.textContent='아이디와 비밀번호를 입력하세요.'; return; }
    try { await signInWithEmailAndPassword(auth, `${id}@workboard.internal`, pw); }
    catch(e){ const c=(e&&e.code)||'';
      if(c.includes('invalid-credential')||c.includes('user-not-found')||c.includes('wrong-password')) err.textContent='아이디 또는 비밀번호가 올바르지 않습니다.';
      else if(c.includes('too-many-requests')) err.textContent='요청이 많습니다. 잠시 후 다시 시도하세요.';
      else err.textContent='로그인 실패: '+(e.message||c);
    }
  };
  window.doLogout = async () => { await signOut(auth); };

  // ── 내 계정(본인 이름·비밀번호 변경) ──
  window.openMyAccount = () => {
    showModal(`<div class="modal-title">내 계정</div>
      <div class="form-group"><label>이름</label><input id="my-name" class="mini-input" style="width:100%" value="${esc((userProfile&&userProfile.displayName)||'')}">
        <div style="text-align:right;margin-top:6px"><button class="btn btn-primary" onclick="saveMyName()">이름 저장</button></div></div>
      <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:12px">
        <div class="fld" style="margin-bottom:8px">비밀번호 변경</div>
        <div class="form-group"><label>현재 비밀번호</label><input id="my-pw0" type="password" class="mini-input" style="width:100%"></div>
        <div class="form-group"><label>새 비밀번호 (6자 이상)</label><input id="my-pw1" type="password" class="mini-input" style="width:100%"></div>
        <div style="text-align:right"><button class="btn btn-primary" onclick="saveMyPw()">비밀번호 변경</button></div>
      </div>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">닫기</button></div>`);
  };
  window.saveMyName = async () => {
    const n=$('my-name').value.trim(); if(!n){ alert('이름을 입력하세요'); return; }
    await setDoc(doc(db,"users",currentUser.uid),{displayName:n},{merge:true});
    if(userProfile) userProfile.displayName=n; const b=$('user-name-badge'); if(b) b.textContent=n;
    alert('이름이 변경되었습니다.');
  };
  window.saveMyPw = async () => {
    const p0=$('my-pw0').value, p1=$('my-pw1').value;
    if(!p0||!p1){ alert('현재/새 비밀번호를 모두 입력하세요'); return; }
    if(p1.length<6){ alert('새 비밀번호는 6자 이상이어야 합니다'); return; }
    try{
      const cred=EmailAuthProvider.credential(currentUser.email, p0);
      await reauthenticateWithCredential(currentUser, cred);
      await updatePassword(currentUser, p1);
      alert('비밀번호가 변경되었습니다.'); closeModal();
    }catch(e){ const c=(e&&e.code)||''; if(c.includes('wrong-password')||c.includes('invalid-credential')) alert('현재 비밀번호가 올바르지 않습니다.'); else alert('변경 실패: '+(e.message||c)); }
  };

  // ── 관리자: 직원 계정 관리(이름 변경 · 접속 차단) ──
  window.openStaffAccount = (uid, name, active) => {
    window.__saActive = active!==false;
    showModal(`<div class="modal-title">계정 관리 — ${esc(name)}</div>
      <div class="form-group"><label>이름</label><input id="sa-name" class="mini-input" style="width:100%" value="${esc(name)}"></div>
      <div class="form-group"><label>접속 상태</label>
        <div class="seg-group modal-seg" id="sa-seg"><button class="seg ${active!==false?'on seg-done':''}" onclick="setSaActive(true,this)">활성(접속 허용)</button><button class="seg ${active===false?'on seg-todo':''}" onclick="setSaActive(false,this)">차단(접속 불가)</button></div></div>
      <div class="muted" style="line-height:1.7">· 차단하면 그 직원은 로그인해도 바로 로그아웃됩니다.<br>· 비밀번호 재설정은 보안상 앱에서 불가 — Firebase 콘솔에서 하세요.</div>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="saveStaffAccount('${uid}')">저장</button></div>`);
  };
  window.setSaActive = (v,btn)=>{ window.__saActive=v; [...btn.parentElement.children].forEach(b=>b.className='seg'); btn.classList.add('on', v?'seg-done':'seg-todo'); };
  window.saveStaffAccount = async (uid)=>{
    const n=$('sa-name').value.trim(); if(!n){ alert('이름을 입력하세요'); return; }
    await setDoc(doc(db,"users",uid),{displayName:n, active:window.__saActive},{merge:true});
    closeModal(); alert('저장되었습니다.'); if(userRole==='boss') renderBossView();
  };

  // ══════════════════════════════════════
  //  오른쪽 메모장 (개인 + 지정 공유)
  // ══════════════════════════════════════
  let memos=[]; let memoCat='';
  async function loadMemos(){
    const uid=currentUser.uid; const map=new Map();
    try{
      const mine=await getDocs(query(collection(db,"memos"),where("owner","==",uid)));
      mine.forEach(d=>map.set(d.id,{id:d.id,...d.data()}));
      const shared=await getDocs(query(collection(db,"memos"),where("sharedWith","array-contains",uid)));
      shared.forEach(d=>{ if(!map.has(d.id)) map.set(d.id,{id:d.id,...d.data()}); });
    }catch(e){ console.error('[WB] memos',e); }
    memos=[...map.values()].sort((a,b)=>((b.updatedAt&&b.updatedAt.seconds)||0)-((a.updatedAt&&a.updatedAt.seconds)||0));
  }
  let memoEditId=null, memoShareOpen=false, memoUsers=null, memoImages=[];
  function memoRenderThumbs(){ const box=$('memo-c-imgs'); if(!box) return; box.innerHTML=memoImages.map((src,i)=>`<span class="memo-thumb"><img src="${src}"><span class="memo-thumb-x" onclick="memoRemoveImg(${i})">✕</span></span>`).join(''); }
  window.memoRemoveImg=(i)=>{ memoImages.splice(i,1); memoRenderThumbs(); };
  window.memoViewImg=(el)=>{ const s=el.querySelector('img')&&el.querySelector('img').src; if(s) showModal(`<div style="text-align:center"><img src="${s}" style="max-width:100%;max-height:70vh;border-radius:8px"></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">닫기</button></div>`); };
  async function memoCompress(blob){ return new Promise((resolve)=>{ const img=new Image(); const url=URL.createObjectURL(blob); img.onload=()=>{ URL.revokeObjectURL(url); const max=1000; let w=img.width,h=img.height; if(w>max){ h=Math.round(h*max/w); w=max; } const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); try{ resolve(c.toDataURL('image/jpeg',0.72)); }catch(e){ resolve(null); } }; img.onerror=()=>{ URL.revokeObjectURL(url); resolve(null); }; img.src=url; }); }
  function memoAttachPaste(){ const ta=$('memo-c-body'); if(!ta||ta.__pb) return; ta.__pb=true; ta.addEventListener('paste', async (e)=>{ const items=(e.clipboardData&&e.clipboardData.items)||[]; for(const it of items){ if(it.type&&it.type.indexOf('image')===0){ e.preventDefault(); const blob=it.getAsFile(); if(blob){ const data=await memoCompress(blob); if(data){ memoImages.push(data); memoRenderThumbs(); } } } } }); }
  function fbErr(e){ const c=(e&&e.code)||''; if(c.indexOf('permission-denied')>=0) return '저장 권한이 없습니다.\n\n(Firestore 보안 규칙에서 memos·businesses 컬렉션 저장을 허용해야 합니다 — 관리자 설정 필요.)'; return '저장 실패: '+((e&&e.message)||c||'알 수 없는 오류'); }
  async function renderMemoPanel(){
    const p=$('memo-panel'); if(!p) return; p.classList.remove('hidden');
    await loadMemos();
    const cats=[...new Set(memos.map(m=>(m.category||'').trim()).filter(Boolean))];
    if(memoCat && !cats.includes(memoCat)) memoCat='';
    const list=memos.filter(m=>!memoCat || (m.category||'')===memoCat);
    const editing = memoEditId ? memos.find(m=>m.id===memoEditId) : null;
    const catChips=`<span class="memo-cat${memoCat===''?' active':''}" onclick="memoSetCat('')">전체</span>`+cats.map(c=>`<span class="memo-cat${memoCat===c?' active':''}" onclick="memoSetCat('${encodeURIComponent(c)}')">${esc(c)}</span>`).join('');
    const card=(m)=>{ const shared=(m.sharedWith||[]).length; const mine=m.owner===currentUser.uid;
      return `<div class="memo-card"><div class="mc-top"><div style="flex:1"><div class="mc-title">${esc(m.title||'(제목 없음)')}</div>${m.category?`<span class="mc-cat">${esc(m.category)}</span>`:''}</div></div>
        ${(m.body||'').trim()?`<div class="mc-body">${esc(m.body||'')}</div>`:''}
        ${(m.images||[]).length?`<div class="memo-imgs">${(m.images||[]).map(src=>`<span class="memo-thumb" onclick="memoViewImg(this)"><img src="${src}"></span>`).join('')}</div>`:''}
        ${shared?`<div class="mc-share">🔗 ${mine?'공유 중':('공유받음 · '+esc(m.ownerName||''))} · ${shared}명</div>`:''}
        <div class="mc-actions"><button class="mc-btn copy" onclick="copyMemo('${m.id}')">📋 복사</button>${mine?`<button class="mc-btn" onclick="memoEdit('${m.id}')">수정</button><button class="mc-btn" onclick="deleteMemo('${m.id}')">삭제</button>`:''}</div></div>`;
    };
    const editShare=(editing&&(editing.sharedWith||[]).length)||0;
    const composer=`<div class="memo-compose">
      ${editing?`<div class="memo-editing">✏️ 수정 중 · <span class="link-btn" onclick="memoCancelEdit()">＋ 새 메모로</span></div>`:''}
      <input id="memo-c-cat" class="mini-input" style="width:100%;margin-bottom:6px" placeholder="카테고리 (선택 · 예: 인사말)" value="${esc(editing?(editing.category||''):'')}">
      <input id="memo-c-title" class="mini-input" style="width:100%;margin-bottom:6px" placeholder="제목 (선택)" value="${esc(editing?(editing.title||''):'')}">
      <textarea id="memo-c-body" class="ta" style="height:66px" placeholder="복붙할 내용을 여기 바로 입력하세요">${esc(editing?(editing.body||''):'')}</textarea>
      <div class="memo-imgs" id="memo-c-imgs"></div>
      <div class="muted" style="font-size:10.5px;margin-top:3px">📎 스크린샷·이미지는 위 내용칸에 <b>Ctrl+V</b>로 붙여넣기</div>
      <div class="memo-compose-row"><span class="link-btn" onclick="memoToggleShare()">🔗 공유${editShare?' ('+editShare+')':''}</span><button class="btn btn-primary" style="padding:5px 12px" onclick="memoQuickSave()">${editing?'수정 저장':'＋ 저장'}</button></div>
      <div id="memo-share-box" class="share-list" style="display:${memoShareOpen?'block':'none'};margin-top:8px"></div>
    </div>`;
    p.innerHTML=`<div class="memo-head"><span class="memo-title">📝 메모장</span></div>${composer}<div class="memo-cats">${catChips}</div>${list.length?list.map(card).join(''):'<div class="memo-empty">아직 메모가 없어요.<br>위에 바로 적고 ＋저장 하세요.</div>'}`;
    if(memoShareOpen) fillMemoShareBox(editing);
    memoRenderThumbs(); memoAttachPaste();
  }
  window.memoSetCat=(c)=>{ memoCat=decodeURIComponent(c); renderMemoPanel(); };
  window.memoEdit=(id)=>{ memoEditId=id; memoShareOpen=false; const m=memos.find(x=>x.id===id); memoImages=m?[...(m.images||[])]:[]; renderMemoPanel(); const p=$('memo-panel'); if(p)p.scrollTop=0; };
  window.memoCancelEdit=()=>{ memoEditId=null; memoShareOpen=false; memoImages=[]; renderMemoPanel(); };
  window.memoToggleShare=async()=>{ memoShareOpen=!memoShareOpen;
    if(memoShareOpen && !memoUsers){ memoUsers=[]; try{ const us=await getDocs(collection(db,"users")); us.forEach(u=>{ if(u.id!==currentUser.uid) memoUsers.push({uid:u.id,name:(u.data().displayName||u.id)}); }); }catch(e){} }
    const box=$('memo-share-box'); if(box){ box.style.display=memoShareOpen?'block':'none'; if(memoShareOpen) fillMemoShareBox(memoEditId?memos.find(m=>m.id===memoEditId):null); } };
  function fillMemoShareBox(editing){ const box=$('memo-share-box'); if(!box) return; const shared=new Set((editing&&editing.sharedWith)||[]); box.innerHTML=(memoUsers&&memoUsers.length)?('<div class="muted" style="margin-bottom:4px">함께 볼 사람 선택</div>'+memoUsers.map(u=>`<label class="share-row"><input type="checkbox" class="share-ck" value="${u.uid}" ${shared.has(u.uid)?'checked':''}> ${esc(u.name)}</label>`).join('')):'<div class="muted">공유할 다른 사용자가 없어요.</div>'; }
  window.copyMemo=async(id)=>{ const m=memos.find(x=>x.id===id); if(!m) return; const txt=m.body||'';
    try{ await navigator.clipboard.writeText(txt); }catch(e){ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(_){} ta.remove(); }
    alert('복사됐어요.'); };
  window.memoQuickSave=async()=>{
    const title=($('memo-c-title')?.value||'').trim(), body=($('memo-c-body')?.value||''), category=($('memo-c-cat')?.value||'').trim();
    if(!title && !body.trim() && !memoImages.length){ alert('내용이나 이미지를 입력하세요'); return; }

  async function renderCalendar(uid){

    const body=$('cal-body');
    for(let i=0;i<7;i++){

        let a=slotStartMin(ev), b=slotEndMin(ev); if(b==null||b<=a) b=a+CAL_STEP;
        a=Math.max(a,sMin); b=Math.min(b,eMin); return {ev,a,b};
      }).filter(o=>o.b>o.a).sort((x,y)=>x.a-y.a||x.b-y.b);
      // 겹치는 업무는 좌우 컬럼으로 나눠 모두 보이게(가려짐 방지)
      let ci=0;
      while(ci<evs.length){
        let j=ci, clEnd=evs[ci].b;
        while(j+1<evs.length && evs[j+1].a<clEnd){ j++; clEnd=Math.max(clEnd,evs[j].b); }
        const cluster=evs.slice(ci,j+1), colEnds=[];
        cluster.forEach(o=>{ let placed=false; for(let k=0;k<colEnds.length;k++){ if(colEnds[k]<=o.a){ o.col=k; colEnds[k]=o.b; placed=true; break; } } if(!placed){ o.col=colEnds.length; colEnds.push(o.b); } });

    const clear=()=>{ dragging=false; if(ghost){ghost.remove();ghost=null;} };

      const durTxt = dur!=null ? `${Math.floor(dur/60)}시간 ${String(dur%60).padStart(2,'0')}분` : '<span class="muted">-</span>';
      return `<tr class="${ds===t0?'att-today':''}"><td>${DAYS[i]} <span class="muted">${dd.getMonth()+1}/${dd.getDate()}</span></td><td>${inTxt}</td><td>${outTxt}</td><td>${durTxt}</td></tr>`;
    }).join('');

      <div class="link-conn">🕘 여기서 출퇴근을 찍고, 이번 주 기록을 한눈에 봅니다.</div>

  async function renderCommentsTab(uid){
    const p=$('wb-panel'); if(!p) return; if(wbTab!=='comments') return;
    p.innerHTML='<div class="link-conn">💬 업무에 남긴·받은 커멘트를 날짜별로 모아봅니다.</div><div class="muted" style="padding:10px">불러오는 중…</div>';
    const items=[];
    try{
      const sSnap=await getDocs(query(collection(db,"slots"),where("uid","==",uid)));
      sSnap.forEach(d=>{ const s=d.data(); (s.comments||[]).forEach(c=>{ items.push({date:s.date||'', at:(c.at&&c.at.seconds)||0, task:s.title||'(제목 없음)', by:c.byName||'', role:c.role||'', text:c.text||'', kind:'chat'}); }); });
      const dSnap=await getDocs(query(collection(db,"daily"),where("uid","==",uid)));
      dSnap.forEach(d=>{ const v=d.data(); if((v.bossComment||'').trim()) items.push({date:v.date||'', at:(v.bossCommentAt&&v.bossCommentAt.seconds)||0, task:'하루 전체 지시', by:'관리자', role:'boss', text:v.bossComment, kind:'order'}); });
    }catch(e){ if(wbTab==='comments') p.innerHTML='<div class="link-conn">💬 커멘트 이력</div><div class="empty">불러오기 실패: '+((e&&e.code)||(e&&e.message)||'')+'</div>'; return; }
    if(wbTab!=='comments') return;
    items.sort((a,b)=> (b.date||'').localeCompare(a.date||'') || (b.at-a.at));
    const groups={}; items.forEach(it=>{ (groups[it.date]=groups[it.date]||[]).push(it); });
    const dates=Object.keys(groups).sort().reverse();
    let html='<div class="link-conn">💬 업무에 남긴·받은 커멘트를 날짜별로 모아봅니다.</div>';
    if(!items.length) html+='<div class="empty">아직 커멘트가 없어요. 업무 블록을 눌러 대화를 남기면 여기 쌓입니다.</div>';
    dates.forEach(dt=>{ html+=`<div class="group-head static" style="margin-top:10px"><span class="grp-name">${dt?dateLabel(dt):'날짜 없음'}</span><span class="grp-count">${groups[dt].length}건</span></div>`;
      groups[dt].forEach(it=>{ const t=it.at?new Date(it.at*1000):null; const tt=t?`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`:'';
        html+=`<div class="cm-row"><div class="cm-task">${it.kind==='order'?'📣':'💬'} ${esc(it.task)}</div><div class="cm-text">${esc(it.text)}</div><div class="cm-meta">${esc(it.by||(it.role==='boss'?'관리자':'직원'))}${tt?' · '+tt:''}</div></div>`; });
    });
    p.innerHTML=html;
  }

  // ── 자동 이월: 이전 마지막 근무일의 미완 → 오늘(원본 보존, 중복 방지) ──
  async function runCarryover(uid, dateStr){
    const dref=doc(db,"daily",`${uid}_${dateStr}`);
    const dsnap=await getDoc(dref);
    if(dsnap.exists() && dsnap.data().carryDone) return;
    const all=await getDocs(query(collection(db,"slots"),where("uid","==",uid)));
    const byDate={}; const todayTitles=[];
    all.forEach(d=>{ const s=d.data(); if(!s.date) return; if(s.date===dateStr){ if(s.title) todayTitles.push(s.title.trim()); } else if(s.date<dateStr){ (byDate[s.date]=byDate[s.date]||[]).push(s); } });
    const prev=Object.keys(byDate).sort().reverse();
    if(!prev.length){ await setDoc(dref,{uid,date:dateStr,carryDone:'none',updatedAt:Timestamp.now()},{merge:true}); return; }
    const src=prev[0];
    const undone=byDate[src].filter(s=>s.title && s.status!=='done');
    const seen=new Set(todayTitles.map(x=>(x||'').trim()));
    const writes=[];
    for(const s of undone){
      const tt=(s.title||'').trim();
      if(seen.has(tt)) continue; seen.add(tt);
      const id=`${uid}_${dateStr}_${newKey()}`;
      writes.push(setDoc(doc(db,"slots",id),{ uid, date:dateStr, title:s.title, biz:s.biz||'', status:'todo', important:!!s.important, category:s.category||'', subtasks:(s.subtasks||[]).map(x=>({text:x.text,done:!!x.done})), startTime:s.startTime||s.plannedTime||'', endTime:s.endTime||'', plannedTime:s.plannedTime||s.startTime||s.hour||'', links:s.links||[], carriedFrom:src, weekStart:weekStart(new Date(dateStr)), updatedAt:Timestamp.now() }));
    }
    // 전날 '내일 할 일 목록'(daily.tomorrowTasks)도 오늘 할 일로 이월
    try{ const pd=await getDoc(doc(db,"daily",`${uid}_${src}`));
      const plan=pd.exists()?(pd.data().tomorrowTasks||[]):[];
      for(const raw of plan){ const tt=(raw||'').trim(); if(!tt||seen.has(tt)) continue; seen.add(tt);
        const id=`${uid}_${dateStr}_${newKey()}`;
        writes.push(setDoc(doc(db,"slots",id),{ uid, date:dateStr, title:tt, status:'todo', important:false, carriedFrom:src, fromPlan:true, weekStart:weekStart(new Date(dateStr)), updatedAt:Timestamp.now() }));
      }
    }catch(e){ console.error('[WB] plan carry', e); }
    writes.push(setDoc(dref,{uid,date:dateStr,carryDone:src,updatedAt:Timestamp.now()},{merge:true}));
    await Promise.all(writes);
  }

  // ── 주제(카테고리) ──
  async function loadCategories(){
    const s=await getDocs(collection(db,"categories")); categories=[];
    s.forEach(d=>categories.push({id:d.id, ...d.data()}));
    categories.sort((a,b)=>(a.order||0)-(b.order||0) || (a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
  }
  const catMapOf = () => { const m={}; categories.forEach(c=>m[c.id]=c); return m; };
  const catOptions = (sel) => '<option value="">미분류</option>'+categories.map(c=>`<option value="${c.id}" ${c.id===sel?'selected':''}>${esc(c.name)}</option>`).join('');

  // ── 오늘 할 일 로드/렌더 ──
  async function loadTodayTasks(uid, dateStr){
    const [snap] = await Promise.all([
      getDocs(query(collection(db,"slots"),where("uid","==",uid),where("date","==",dateStr))),
      loadCategories()
    ]);
    todayTasks=[]; snap.forEach(d=>todayTasks.push({id:d.id, ...d.data()}));
    renderTaskList(uid);
    // ⚠ 렌더 경로에서는 daily에 쓰지 않는다(실시간 리스너 재렌더 → 무한 깜빡임 방지). topGoals 갱신은 실제 변경(중요표시/상태변경) 시에만.
  }
  function sortTasks(a,b){
    if(!!b.important - !!a.important) return (!!b.important)-(!!a.important);
    const ta=a.plannedTime||a.hour||'99:99', tb=b.plannedTime||b.hour||'99:99';
    if(ta!==tb) return ta.localeCompare(tb);
    return (a.updatedAt?.seconds||0)-(b.updatedAt?.seconds||0);
  }
  function renderTaskList(uid){
    const box=$('task-list'); if(!box) return;
    const tlist=todayTasks.filter(bizMatch);   // 선택된 사업만
    if(!tlist.length){ box.innerHTML='<div class="empty">아직 오늘 할 일이 없어요. 아래에 한 줄 적어보세요.</div>'; updateMissCheck(); return; }
    const cm=catMapOf();
    const groups=new Map();
    tlist.forEach(t=>{ const cid=(t.category && cm[t.category])?t.category:'__none__'; if(!groups.has(cid))groups.set(cid,[]); groups.get(cid).push(t); });
    const orderedIds=categories.filter(c=>groups.has(c.id)).map(c=>c.id);
    if(groups.has('__none__')) orderedIds.push('__none__');
    box.innerHTML='';
    orderedIds.forEach(cid=>{
      const cat = cid==='__none__' ? {id:'__none__',name:'미분류',color:'#cbd2dc'} : cm[cid];
      const tasks=groups.get(cid).slice().sort(sortTasks);
      const doneN=tasks.filter(t=>(t.status||'todo')==='done').length;
      const collapsed=collapsedCats.has(cid);
      const gh=el('div','group-head');
      gh.innerHTML=`<i class="grp-caret">${collapsed?'▸':'▾'}</i><span class="grp-dot" style="background:${cat.color||'#cbd2dc'}"></span><span class="grp-name">${esc(cat.name)}</span><span class="grp-count">${doneN}/${tasks.length}</span>`;
      gh.onclick=()=>{ collapsed?collapsedCats.delete(cid):collapsedCats.add(cid); renderTaskList(uid); };
      box.appendChild(gh);
      if(collapsed) return;
      tasks.forEach(t=>box.appendChild(taskRow(uid,t)));
    });
    updateMissCheck();
  }
  function taskRow(uid,t){
    const st=t.status==='skip'?'todo':(t.status||'todo');
    const carried=!!t.carriedFrom;
    const subs=t.subtasks||[]; const subDone=subs.filter(s=>s.done).length;
    const expanded=expandedSubs.has(t.id);
    const row=el('div','task-row'+(t.important?' task-important':'')+(carried?' carry-item':'')+(st==='done'?' task-done':''));
    const seg=(s,lbl,cls)=>`<button class="seg ${st===s?'on '+cls:''}" onclick="setTaskStatus('${uid}','${t.id}','${s}')">${lbl}</button>`;
    const subLine = subs.length?`<span class="subline" onclick="toggleSub('${uid}','${t.id}')">🗂 하위 ${subDone}/${subs.length} ${expanded?'▾':'▸'}</span>`:'';
    let subBox='';
    if(subs.length && expanded){
      subBox=`<div class="subbox">${subs.map((s,i)=>`<div class="subrow"><span class="scheck ${s.done?'on':''}" onclick="toggleSubDone('${uid}','${t.id}',${i})">${s.done?'✓':''}</span><span class="${s.done?'sdone':''}" style="flex:1">${esc(s.text)}</span><span class="xsub" onclick="removeSub('${uid}','${t.id}',${i})">✕</span></div>`).join('')}<div class="subrow"><span style="width:16px"></span><input class="sub-inp" id="subin_${t.id}" placeholder="＋ 단계 추가 · Enter" onkeydown="if(event.key==='Enter')addSub('${uid}','${t.id}')"></div></div>`;
    }
    row.innerHTML=`
      <span class="star" onclick="toggleImportant('${uid}','${t.id}')" title="중요 표시">${t.important?'★':'☆'}</span>
      <div class="task-main">
        <div class="task-title">${esc(t.title)}${carried?' <span class="pill pill-carry">이월</span>':''}${t.needsHelp&&!t.helpResolved?' <span class="pill pill-help">도움요청</span>':''}</div>
        <div class="task-sub">${(t.plannedTime||t.hour)?`<span class="task-meta">${t.plannedTime||t.hour}</span>`:''}${subLine}</div>
        ${(t.links||[]).length?`<div class="task-links">${linkPills(t.links)}</div>`:''}
        ${t.bossComment?`<div class="boss-inline">👑 ${esc(t.bossComment)}</div>`:''}
        ${subBox}
      </div>
      <div class="seg-group">${seg('done','완료','seg-done')}${seg('wip','진행','seg-wip')}${seg('todo','못함','seg-todo')}</div>
      <span class="more" onclick="openTaskDetail('${uid}','${t.id}')" title="상세">⋯</span>`;
    return row;
  }

  window.addTask = async (uid) => {
    const inp=$('new-task'); const title=(inp?.value||'').trim(); if(!title) return;

  };

  // 중요표시 → daily.topGoals 미러(관리자 화면 호환)
  async function syncGoals(uid){
    const goals=todayTasks.filter(t=>t.important).map(t=>({text:t.title, done:t.status==='done'}));
    // 값이 실제로 바뀐 경우에만 쓰기(불필요한 실시간 재렌더/루프 방지)
    const prev=(wbCache&&wbCache.daily&&wbCache.daily.topGoals)||[];
    if(JSON.stringify(prev)!==JSON.stringify(goals)){
      try{ await setDoc(doc(db,"daily",`${uid}_${today()}`),{uid,date:today(),topGoals:goals,updatedAt:Timestamp.now()},{merge:true}); }catch(e){}

  }

  function openSlotModal(uid, date, hour, cellEl){

        ${isBoss&&!isOwner?`<div class="form-group"><label>관리자 코멘트</label><textarea id="s-comment" class="ta">${esc(d.bossComment)}</textarea></div>`:''}

      document.querySelectorAll('.modal-seg .seg').forEach(b=>{ if(b.dataset.s===selStatus) b.classList.add('on','seg-'+selStatus); b.addEventListener('click',()=>{ selStatus=b.dataset.s; document.querySelectorAll('.modal-seg .seg').forEach(x=>x.className='seg'); b.classList.add('on','seg-'+selStatus); }); });
      (d.links||[]).forEach(l=>addLinkRow(l.label,l.url)); if(!(d.links&&d.links.length)) addLinkRow();
      $('slot-save').onclick=async()=>{ const title=$('s-title').value.trim(); if(!title){alert('업무 내용을 입력하세요');return;}
        const links=[...document.querySelectorAll('#s-links .link-edit')].map(r=>({label:r.querySelector('.link-label').value.trim(),url:r.querySelector('.link-url').value.trim()})).filter(l=>isValidUrl(l.url));
        const payload={uid,date,hour,plannedTime:hour,title,status:selStatus,memo:$('s-memo').value.trim(),links,weekStart:weekStart(new Date(date)),updatedAt:Timestamp.now()};
        if($('s-help')){ payload.needsHelp=$('s-help').checked; payload.helpNote=$('s-help-note').value.trim(); }
        if($('s-comment')) payload.bossComment=$('s-comment').value.trim();

  async function loadBossTodayView(s){
    const dateStr=today(); const slotsQ=query(collection(db,"slots"),where("uid","==",s.uid),where("date","==",dateStr)); const dailyRef=doc(db,"daily",`${s.uid}_${dateStr}`);
    const sn=await getDocs(slotsQ); let done=0,total=0; const slots=[]; sn.forEach(d=>{const sd=d.data(); slots.push({id:d.id,...sd}); total++; if(sd.status==='done')done++;});
    slots.sort(sortTasks);
    const md=(await getDoc(dailyRef)).data()||{};
    const mli=lateInfo(md.clockIn,s.workStart);
    const att=md.clockIn?`출근 ${md.clockIn}${mli.late?` · 지각 ${mli.mins}분`:' · 정상'}${md.clockOut?` · 퇴근 ${md.clockOut}`:''}`:'미출근';
    let rtTxt=''; try{ const rSnap=await getDocs(collection(db,"routines")); let rTot=0,rDone=0; const ds=new Set(md.routinesDone||[]); rSnap.forEach(r=>{const d=r.data(); if(d.active!==false&&(d.targetUid==='all'||d.targetUid===s.uid)){rTot++; if(ds.has(r.id))rDone++;}}); if(rTot>0) rtTxt=` · 필수업무 ${rDone}/${rTot}`; }catch(e){}
    const meta=$('staff-meta'); if(meta) meta.textContent=`오늘 완료 ${done}/${total}${rtTxt} · ${att}`;
    await loadCategories();
    const wrap=$('boss-today-slots');
    if(wrap){
      const cm=catMapOf(); const grp=new Map();
      slots.forEach(sl=>{ const cid=(sl.category&&cm[sl.category])?sl.category:'__none__'; if(!grp.has(cid))grp.set(cid,[]); grp.get(cid).push(sl); });
      const ord=categories.filter(c=>grp.has(c.id)).map(c=>c.id); if(grp.has('__none__'))ord.push('__none__');
      const rowHtml = sl=>`<div class="task-row static ${sl.status==='done'?'task-done':''}">

        <span class="badge" style="color:${SVAR[sl.status]}">${STATUS_LABEL[sl.status]||''}</span>
        <div class="row" style="gap:4px;margin-left:6px"><button class="btn-sm btn-approve" onclick="approveSlot('${sl.id}',true)">승인</button><button class="btn-sm btn-return" onclick="approveSlot('${sl.id}',false)">반려</button></div>
      </div>`;
      let inner='';
      if(slots.length){
        inner+='<div class="cat-summary">'+ord.map(cid=>{const cat=cid==='__none__'?{name:'미분류',color:'#cbd2dc'}:cm[cid];const ts=grp.get(cid);const d=ts.filter(x=>x.status==='done').length;return `<span class="cat-chip"><span class="grp-dot" style="background:${cat.color||'#cbd2dc'}"></span>${esc(cat.name)} ${d}/${ts.length}</span>`;}).join('')+'</div>';
        ord.forEach(cid=>{ const cat=cid==='__none__'?{name:'미분류',color:'#cbd2dc'}:cm[cid]; const ts=grp.get(cid).slice().sort(sortTasks); const d=ts.filter(x=>x.status==='done').length;

        });

      wrap.innerHTML='<div class="soft-card"><div class="sec-title">오늘 할 일 <span class="muted" style="font-weight:400">· 주제별</span></div>'+inner+'</div>';

      <div class="fld" style="margin-top:14px">내일 계획</div><div class="fbox">${esc(dData.tomorrowDetail)||(dData.tomorrowTasks||[]).map((t,i)=>`${i+1}. ${esc(t)}`).join('<br>')||'(아직 입력하지 않음)'}</div>

    }

  };
  window.sendDirectMessage = async (uid) => { const msg=$('direct-msg')?.value.trim()||''; if(!msg){ alert('내용을 입력하세요'); return; } await setDoc(doc(db,"daily",`${uid}_${today()}`),{bossComment:msg,bossCommentAt:Timestamp.now(),bossCommentBy:currentUser.uid},{merge:true}); closeModal(); alert('지시가 전달되었습니다.'); };

  async function renderTeamOverview(staffList){
    document.querySelectorAll('.staff-item').forEach(i=>i.classList.remove('active'));
    const main=$('main-content'); const dateStr=today();
    main.innerHTML=`<div class="page-header"><div class="page-title">팀 전체 현황 <span class="muted">· ${dateLabel(dateStr)}</span></div></div><div id="team-alerts"></div><div id="team-banner"></div><div class="team-grid" id="team-grid"></div>`;
    const grid=$('team-grid'); const blockers=[],helps=[],alerts=[];
    for(const s of staffList){
      const sn=await getDocs(query(collection(db,"slots"),where("uid","==",s.uid),where("date","==",dateStr)));
      let done=0,wip=0,undone=0; sn.forEach(d=>{const sd=d.data(); const st=sd.status; if(st==='done')done++; else if(st==='wip')wip++; else undone++; if(sd.needsHelp&&!sd.helpResolved) helps.push({name:s.displayName||s.email,title:sd.title||''});});
      const total=done+wip+undone; const pct=total>0?Math.round(done/total*100):0; const pc=pct>=80?'var(--success)':pct>=50?'var(--warn)':'var(--danger)';
      const dd=(await getDoc(doc(db,"daily",`${s.uid}_${dateStr}`))).data()||{};
      const feedback=dd.selfFeedback||''; const li=lateInfo(dd.clockIn,s.workStart); const goals=dd.topGoals||[]; const goalsDone=goals.filter(g=>g.done).length; const blocker=(dd.blocker||'').trim();
      if(blocker&&!dd.blockerResolved) blockers.push({name:s.displayName||s.email,text:blocker});
      const anom=[]; if(dd.clockIn&&total===0) anom.push('출근했으나 업무 미기록');
      const anyMemo=sn.docs.some(x=>(x.data().memo||'').trim());
      if(total>0&&done===total&&!anyMemo&&!feedback.trim()) anom.push('전부 완료·근거 없음');
      try{ const dAll=await getDocs(query(collection(db,"daily"),where("uid","==",s.uid))); const da=[]; dAll.forEach(x=>da.push(x.data())); da.sort((a,b)=>(b.date||'').localeCompare(a.date||'')); const r3=da.slice(0,3); if(r3.length>=3&&r3.every(day=>{const g=day.topGoals||[]; return g.length===0||g.filter(x=>x.done).length<g.length;})) anom.push('목표 3일 연속 미달'); }catch(e){}
      anom.forEach(a=>alerts.push({name:s.displayName||s.email,text:a}));
      const att=dd.clockIn?`출근 ${dd.clockIn} · ${li.late?`<span class="late">지각 ${li.mins}분</span>`:'<span class="ontime">정상</span>'}${dd.clockOut?` · 퇴근 ${dd.clockOut}`:''}`:'<span class="muted">미출근</span>';
      const card=el('div','team-card');
      card.innerHTML=`<div class="team-card-header"><div class="staff-avatar" style="background:${s.color||'#4f6bed'}">${(s.displayName||'?')[0]}</div><div><div class="team-name">${s.displayName||s.email}</div><div class="muted" style="font-size:11px">${att}</div></div><div class="team-pct" style="color:${pc}">${pct}%</div></div>
        <div class="progress-bar"><div style="width:${pct}%;background:${pc}"></div></div>
        <div class="team-stats"><span class="ontime">완료 ${done}</span><span style="color:var(--warn)">진행 ${wip}</span><span class="muted">미완 ${undone}</span><span style="margin-left:auto;color:var(--accent-text)">★ ${goalsDone}/${goals.length}</span></div>
        ${blocker?`<div class="team-alert danger">🚨 ${esc(blocker)}</div>`:''}
        ${anom.length?`<div class="team-alert warn">⚠️ ${esc(anom.join(' · '))}</div>`:''}
        ${feedback?`<div class="team-feedback">"${esc(feedback.slice(0,80))}${feedback.length>80?'…':''}"</div>`:'<div class="team-feedback muted">아직 피드백 없음</div>'}
        <button class="btn btn-ghost" style="width:100%;margin-top:10px" onclick="event.stopPropagation()">상세 보기 →</button>`;
      card.querySelector('button').addEventListener('click',()=>selectStaff(s,staffList)); grid.appendChild(card);
    }
    const aw=$('team-alerts'); if(aw&&alerts.length) aw.innerHTML=`<div class="banner warn"><b>⚠️ 주목 ${alerts.length}건</b> · ${alerts.map(a=>esc(`${a.name}: ${a.text}`)).join(' · ')}</div>`;
    const bw=$('team-banner'); const items=[]; blockers.forEach(b=>items.push(`${b.name} (${b.text})`)); helps.forEach(h=>items.push(`${h.name} — ${h.title}`));
    if(bw&&items.length) bw.innerHTML=`<div class="banner danger"><b>🆘 도움요청 ${items.length}건</b> · ${items.map(esc).join(' · ')}</div>`;
  }

  // ── 모달 ──
  window.showModal = (html) => { $('modal-body').innerHTML=html; $('modal-overlay').style.display='flex'; };
  window.closeModal = () => { if(_threadUnsub){try{_threadUnsub();}catch(e){} _threadUnsub=null;} $('modal-overlay').style.display='none'; };
  $('modal-overlay')?.addEventListener('click',e=>{ if(e.target===$('modal-overlay')) closeModal(); });
</script>

<style>
:root{

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes starPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.28)}}

/* 로그인 */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}

.login-logo span{color:var(--accent);}
.login-sub{font-size:13px;color:var(--text-3);margin-bottom:28px;}
.login-label{font-size:12px;color:var(--text-2);font-weight:600;margin-bottom:6px;display:block;}
.login-input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:10px 12px;outline:none;margin-bottom:12px;}
.login-input:focus{border-color:var(--accent);background:#fff;}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}

.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}

.app-body{display:flex;flex:1;overflow:hidden;}

#main-content{flex:1;overflow-y:auto;padding:22px 26px;width:100%;min-width:0;}

.memo-title{font-size:14px;font-weight:800;}

.memo-cat.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.memo-card{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 11px;margin-bottom:9px;}
.memo-card .mc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}

.memo-card .mc-body{font-size:12px;color:var(--text-2);line-height:1.55;margin-top:6px;white-space:pre-wrap;word-break:break-word;max-height:110px;overflow:auto;}
.memo-card .mc-actions{display:flex;gap:6px;margin-top:8px;}
.memo-card .mc-btn{font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--surface);border-radius:7px;padding:4px 9px;cursor:pointer;color:var(--text-2);}
.memo-card .mc-btn.copy{color:var(--accent-text);border-color:#cdd7f7;background:var(--accent-bg);}
.memo-card .mc-share{font-size:10px;color:var(--warn);margin-top:4px;}
.memo-empty{color:var(--text-3);font-size:12px;text-align:center;padding:20px 8px;}
.memo-imgs{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
.memo-thumb{position:relative;display:inline-block;width:58px;height:58px;border-radius:7px;overflow:hidden;border:1px solid var(--border);cursor:pointer;background:var(--surface-2);}

.memo-thumb .memo-thumb-x{position:absolute;top:1px;right:1px;width:16px;height:16px;line-height:15px;text-align:center;font-size:10px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;cursor:pointer;}
.share-list{max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px;}
.share-row{display:flex;align-items:center;gap:8px;padding:4px 2px;font-size:13px;}
.muted{color:var(--text-3);font-size:12px;}
.empty{color:var(--text-3);padding:22px;text-align:center;background:var(--surface);border-radius:10px;border:1px dashed var(--border-strong);font-size:13px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:19px;font-weight:800;color:var(--text);letter-spacing:-0.3px;}
.page-sub{font-size:12px;color:var(--text-3);margin-top:3px;}
.staff-header-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;}
.row{display:flex;align-items:center;}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 10px;}

.fld{font-size:12px;font-weight:600;color:var(--text-2);display:block;}

/* 탭 */

.seg.on.seg-wip{background:var(--warn);color:#fff;}

.more{font-size:18px;color:var(--text-3);cursor:pointer;flex-shrink:0;padding:0 2px;line-height:1;}
.more:hover{color:var(--text);}
.badge{font-size:12px;font-weight:600;flex-shrink:0;}
/* 주제 그룹 */
.group-head{display:flex;align-items:center;gap:8px;padding:9px 4px;cursor:pointer;border-bottom:1px solid var(--border);margin-top:2px;}
.group-head.static{cursor:default;}
.grp-caret{font-style:normal;font-size:11px;color:var(--text-3);width:10px;}
.grp-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block;}

.cat-summary{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.cat-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;}
/* 하위 단계 */
.task-sub{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:2px;}
.subline{font-size:11.5px;color:var(--accent-text);cursor:pointer;font-weight:500;}
.subbox{margin-top:7px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:7px 10px;}
.subrow{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12.5px;color:var(--text);}
.scheck{width:17px;height:17px;border-radius:5px;border:1.4px solid var(--border-strong);display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:var(--success);cursor:pointer;flex-shrink:0;background:#fff;}
.scheck.on{background:var(--success-bg);border-color:var(--success);}
.sdone{color:var(--text-3);text-decoration:line-through;}
.xsub{color:var(--text-3);cursor:pointer;font-size:12px;flex-shrink:0;}
.xsub:hover{color:var(--danger);}
.sub-inp{flex:1;border:none;background:transparent;outline:none;font-size:12.5px;color:var(--text);padding:2px 0;}

.add-row{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px 10px;margin-top:2px;}
.add-plus{color:var(--text-3);font-style:normal;font-size:16px;}
.add-input{flex:1;border:none;background:transparent;outline:none;font-size:14px;color:var(--text);padding:6px 0;}

/* 마무리 */
.wrap-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:16px;font-size:14px;font-weight:600;color:var(--text);}
.wrap-toggle i{font-style:normal;color:var(--text-3);margin-right:4px;}
.tmr-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.xbtn{background:transparent;border:none;color:var(--text-3);cursor:pointer;font-size:14px;}
.xbtn:hover{color:var(--danger);}
.miss{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.miss-t{font-size:12px;font-weight:700;color:var(--text-2);}
.chip{display:inline-block;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--surface-2);color:var(--text-2);margin:2px 0;}
.chip-ok{background:var(--success-bg);color:#15803d;}
.chip-bad{background:var(--danger-bg);color:var(--danger);}

/* 필수업무 */
.rt-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.rt-row:last-child{border-bottom:none;}
.rt-check{width:20px;height:20px;border-radius:6px;border:1.6px solid var(--border-strong);display:inline-flex;align-items:center;justify-content:center;font-size:13px;color:var(--success);cursor:pointer;flex-shrink:0;background:#fff;}
.rt-check.on{background:var(--success-bg);border-color:var(--success);}
.rt-title{font-size:13.5px;font-weight:600;color:var(--text);}
.rt-title.done{color:var(--text-3);text-decoration:line-through;}
.rt-guide{margin-top:6px;background:var(--accent-bg);border:1px solid #cdd7f7;border-radius:8px;padding:8px 10px;font-size:12px;color:var(--accent-text);line-height:1.7;white-space:pre-wrap;}
.linkpill{display:inline-flex;align-items:center;gap:4px;background:var(--accent-bg);border:1px solid #d3ddf8;color:var(--accent-text);border-radius:20px;padding:2px 9px;font-size:11px;text-decoration:none;margin:3px 4px 0 0;}
.link-edit{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.help-box{border:1px solid #f0d9a8;border-radius:8px;padding:10px;background:var(--warn-bg);color:var(--warn);}

/* 주간 그리드 */
.week-grid{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.week-header-row{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:1px solid var(--border);}
.time-col-hdr{padding:8px;}
.day-hdr{padding:8px 6px;text-align:center;font-size:12px;font-weight:700;color:var(--text-2);border-left:1px solid var(--border);line-height:1.4;}
.day-hdr.today{color:var(--accent);background:var(--accent-bg);}
.day-date{font-size:10px;font-weight:400;color:var(--text-3);}
.week-row{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:1px solid var(--border);}
.week-row:last-child{border-bottom:none;}
.time-col{padding:8px;font-size:11px;color:var(--text-3);display:flex;align-items:center;}
.week-cell{border-left:1px solid var(--border);min-height:50px;padding:4px;cursor:pointer;transition:background .1s;}
.week-cell:hover{background:var(--surface-2);}
.week-cell.today-col{background:#f0f4ff;}
.slot-chip{padding:4px 6px;border-radius:6px;background:var(--surface-2);border-left:3px solid var(--accent);min-height:42px;}
.slot-title{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:2px;}
.slot-status{font-size:10px;font-weight:600;}

/* 지난 기록 */
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;}
.hist-row:last-child{border-bottom:none;}
.hist-row:hover{background:var(--surface-2);}
.fbox{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text-2);line-height:1.7;margin-top:5px;}
.fbox.danger{border-color:#f3c0c0;color:var(--danger);background:var(--danger-bg);}

/* 오늘 상세(관리자) 2열 */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.help-note{font-size:11.5px;color:var(--warn);margin-top:3px;}

/* 폼 */
.form-group{margin-bottom:14px;}
.form-group label{font-size:12px;color:var(--text-2);font-weight:600;display:block;margin-bottom:5px;}

/* 버튼 */
.btn{padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:all .12s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#3f5bd8;}
.btn-ghost{background:var(--surface);color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid #f3c0c0;}
.btn-sm{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;}
.btn-approve{background:var(--success-bg);color:var(--success);border:1px solid #b6e6c8;}
.btn-return{background:var(--danger-bg);color:var(--danger);border:1px solid #f3c0c0;}

/* 팀 */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 1px 2px rgba(30,40,80,.03);}
.team-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.team-name{font-weight:700;color:var(--text);}
.team-pct{margin-left:auto;font-size:20px;font-weight:800;}
.progress-bar{background:var(--surface-2);border-radius:4px;height:6px;overflow:hidden;margin-bottom:10px;}
.progress-bar>div{height:100%;border-radius:4px;transition:width .3s;}
.team-stats{display:flex;gap:12px;font-size:12px;font-weight:600;margin-bottom:8px;}
.team-feedback{font-size:12px;color:var(--text-2);font-style:italic;line-height:1.5;}
.team-alert{font-size:11.5px;font-weight:600;border-radius:6px;padding:5px 8px;margin-top:6px;}
.team-alert.danger{color:var(--danger);background:var(--danger-bg);border:1px solid #f3c0c0;}
.team-alert.warn{color:#92600d;background:var(--warn-bg);border:1px solid #f0d9a8;}
.banner{border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;}
.banner.warn{background:var(--warn-bg);border:1px solid #f0d9a8;color:#92600d;}
.banner.danger{background:var(--danger-bg);border:1px solid #f3c0c0;color:var(--danger);}

/* 모달 */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,40,70,.35);z-index:100;align-items:center;justify-content:center;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 12px 40px rgba(30,40,80,.18);}
.modal-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:18px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--border);}
.modal-seg{display:inline-flex;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}

/* ===== 리디자인: 캘린더 중심 ===== */
.wb-tabbar{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;flex-wrap:wrap;}
.wb-tabbtn{border:none;background:transparent;color:var(--text-2);font-size:13px;font-weight:600;padding:8px 13px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.wb-tabbtn .cnt{font-size:11px;background:var(--surface-2);color:var(--text-3);border-radius:10px;padding:1px 7px;font-weight:700;}
.wb-tabbtn .cnt:empty{display:none;}
.wb-tabbtn.active{background:var(--accent);color:#fff;}
.wb-tabbtn.active .cnt{background:rgba(255,255,255,.25);color:#fff;}
.biz-bar{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 12px;}
.biz-btn{border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:12.5px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;}
.biz-btn:hover{border-color:var(--accent);}
.biz-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.biz-btn.ghost{color:var(--text-3);border-style:dashed;}
.live-badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--success);background:var(--success-bg);border:1px solid #b6e6c8;border-radius:20px;padding:4px 10px;}
.live-badge.off{color:var(--text-3);background:var(--surface-2);border-color:var(--border);}
.live-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:livePulse 1.8s infinite;}
.live-badge.off .dot{background:var(--text-3);animation:none;}
@keyframes livePulse{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}70%{box-shadow:0 0 0 7px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
.wb-msg{display:flex;align-items:flex-start;gap:12px;border-radius:12px;padding:12px 15px;margin-bottom:14px;background:var(--warn-bg);border:1px solid #f0d9a8;}
.wb-msg .ic{font-size:20px;}
.wb-msg .mt{color:#92600d;font-weight:700;}
.wb-msg .ms{color:#7a5510;font-size:13px;margin-top:2px;line-height:1.5;white-space:pre-wrap;}
.wb-msg .rt{margin-left:auto;font-size:11px;color:#a9803f;white-space:nowrap;}
.legend{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:2px 2px 12px;font-size:12px;color:var(--text-2);}
.legend .item{display:inline-flex;align-items:center;gap:6px;}
.legend .sw{width:11px;height:11px;border-radius:3px;}
.legend .hint{margin-left:auto;color:var(--text-3);}
.wknav{display:flex;align-items:center;gap:8px;}
.wknav button{border:1px solid var(--border);background:var(--surface);border-radius:8px;min-width:30px;height:30px;cursor:pointer;color:var(--text-2);font-size:13px;padding:0 8px;}
.wknav button:hover{border-color:var(--accent);color:var(--accent);}
.cal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(30,40,80,.05);}
.cal-scroll{max-height:calc(100vh - 250px);min-height:420px;overflow-y:auto;position:relative;}
.cal-head{display:grid;grid-template-columns:56px repeat(7,1fr);border-bottom:1px solid var(--border);background:var(--soft);position:sticky;top:0;z-index:8;}
.cal-head .th{padding:7px 4px 6px;text-align:center;font-size:12px;font-weight:700;color:var(--text-2);border-left:1px solid var(--border);}
.cal-head .th:first-child{border-left:none;}
.cal-head .th.sat{color:#3b6fd4;} .cal-head .th.sun{color:#d05a5a;}
.cal-head .th.today{color:var(--accent-text);}
.cal-head .th .d{font-size:11px;font-weight:600;color:var(--text-3);margin-top:2px;}
.cal-head .th.today .pill{display:inline-block;min-width:19px;line-height:19px;height:19px;border-radius:11px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:0 5px;margin-top:2px;}
.cal-body{display:grid;grid-template-columns:56px repeat(7,1fr);position:relative;}
.cal-tcol{display:block;padding:0;position:relative;}
.cal-tcol .tl{position:absolute;right:7px;font-size:10.5px;color:var(--text-3);white-space:nowrap;font-variant-numeric:tabular-nums;}
/* 근태 표 */
.att-table{width:100%;border-collapse:collapse;font-size:13px;}
.att-table th{text-align:left;font-size:11.5px;font-weight:700;color:var(--text-3);padding:6px 8px;border-bottom:1px solid var(--border);}
.att-table td{padding:9px 8px;border-bottom:1px solid var(--border);color:var(--text-2);}
.att-table tr:last-child td{border-bottom:none;}
.att-table tr.att-today td{background:var(--accent-bg);color:var(--text);font-weight:600;}
/* 커멘트 이력 */
.cm-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin:6px 0;}
.cm-task{font-size:12px;font-weight:700;color:var(--accent-text);}
.cm-text{font-size:13.5px;color:var(--text);line-height:1.5;margin-top:4px;white-space:pre-wrap;word-break:break-word;}
.cm-meta{font-size:11px;color:var(--text-3);margin-top:4px;}
.day-col{position:relative;border-left:1px solid var(--border);cursor:crosshair;
  background-image:
    repeating-linear-gradient(to bottom,transparent 0,transparent 87px,var(--border) 87px,var(--border) 88px),
    repeating-linear-gradient(to bottom,transparent 0,transparent 43px,#eef1f6 43px,#eef1f6 44px);}
.day-col.today{background-color:#f7f9ff;}
.evt{position:absolute;border-radius:7px;padding:3px 6px 3px 8px;font-size:11px;line-height:1.18;overflow:hidden;cursor:pointer;
  border:1px solid rgba(30,40,80,.06);border-left:3px solid #64748b;box-shadow:0 1px 2px rgba(30,40,80,.05);transition:box-shadow .12s,transform .12s;}
.evt:hover{box-shadow:0 4px 10px rgba(30,40,80,.16);transform:translateY(-1px);z-index:7;}
.evt .et{font-weight:700;color:var(--text);overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;word-break:break-word;}
.evt .es{font-size:9.5px;color:var(--text-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums;}
.evt .star{color:var(--important);}
.evt.done{opacity:.64;}
.evt.done .et{text-decoration:line-through;color:var(--text-2);}
.evt .badge{position:absolute;bottom:2px;right:4px;font-size:10.5px;line-height:1;}
.drag-ghost{position:absolute;left:3px;right:3px;background:var(--accent-bg);border:1.5px dashed var(--accent);border-radius:7px;color:var(--accent-text);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:6;}
.nowline{position:absolute;height:2px;background:var(--danger);z-index:5;pointer-events:none;}
.nowline::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--danger);}
.cal-hint{font-size:11.5px;color:var(--text-3);margin-top:10px;line-height:1.6;}
.link-conn{font-size:11.5px;color:var(--accent-text);background:var(--accent-bg);border:1px solid #cdd7f7;border-radius:8px;padding:8px 11px;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
/* 실시간 대화 */
.thread{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px;max-height:210px;overflow-y:auto;}
.thread .empty2{color:var(--text-3);font-size:12px;text-align:center;padding:14px;}
.msg{margin-bottom:9px;}
.msg .who{font-size:11px;font-weight:700;color:var(--text-2);}
.msg .bubble{font-size:12.5px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 9px;margin-top:2px;display:inline-block;max-width:100%;white-space:pre-wrap;word-break:break-word;}
.msg.mine{text-align:right;}
.msg.boss .who{color:var(--warn);}
.msg.boss .bubble{background:var(--warn-bg);border-color:#f0d9a8;}
.reply{display:flex;gap:6px;margin-top:8px;}
.reply input{flex:1;border:1px solid var(--border);border-radius:8px;background:var(--surface-2);padding:8px 10px;font-size:13px;outline:none;}
/* 알림 */
.notif-wrap{position:relative;display:inline-flex;}
.notif-bell{position:relative;border:1px solid var(--border);background:var(--surface);border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;}
.notif-bell:hover{border-color:var(--accent);}
.notif-count{position:absolute;top:-6px;right:-6px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;background:var(--danger);color:#fff;font-size:10.5px;font-weight:700;align-items:center;justify-content:center;box-shadow:0 0 0 2px var(--surface);}
.notif-panel{position:absolute;top:42px;right:0;width:310px;max-height:60vh;overflow-y:auto;background:var(--surface);border:1px solid var(--border-strong);border-radius:12px;box-shadow:0 12px 30px rgba(30,40,80,.18);z-index:50;}
.nt-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 13px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);font-size:13px;}
.nt-opts{display:flex;gap:10px;}
.nt-toggle{font-size:11px;color:var(--text-2);display:inline-flex;align-items:center;gap:4px;cursor:pointer;}
.nt-list{padding:4px 0;}
.nt-row{padding:9px 13px;border-bottom:1px solid var(--border);}
.nt-row:last-child{border-bottom:none;}
.nt-task{font-size:11.5px;font-weight:700;color:var(--accent-text);}
.nt-text{font-size:12.5px;color:var(--text);line-height:1.45;margin-top:2px;word-break:break-word;}
.nt-meta{font-size:10.5px;color:var(--text-3);margin-top:3px;}
.wb-toast{position:fixed;right:20px;bottom:20px;max-width:340px;background:#1f2430;color:#fff;font-size:13px;line-height:1.45;padding:11px 14px;border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.28);opacity:0;transform:translateY(10px);transition:opacity .18s,transform .18s;pointer-events:none;z-index:9999;word-break:break-word;}
.wb-toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Work<span>Board</span></div>
    <div class="login-sub">업무 현황 관리 시스템</div>
    <label class="login-label">아이디</label>
    <input id="login-id" class="login-input" placeholder="아이디 입력" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()">
    <label class="login-label">비밀번호</label>
    <input id="login-pw" class="login-input" type="password" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>

<div id="app-screen">
  <div class="top-nav">
    <div class="nav-logo">Work<span>Board</span></div>
    <div class="nav-right">
      <div class="notif-wrap">
        <button class="notif-bell" id="notif-bell" onclick="toggleNotifPanel()" title="알림">🔔<span class="notif-count" id="notif-count" style="display:none"></span></button>
        <div class="notif-panel" id="notif-panel" style="display:none"></div>
      </div>
      <span class="user-name" id="user-name-badge"></span>
      <div id="role-badge" class="role-badge"></div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="app-body">
    <div id="sidebar"></div>
    <div id="main-content"></div>
    <div id="memo-resize" title="드래그해서 메모장 폭 조절"></div>
    <div id="memo-panel"></div>
  </div>
</div>

<div id="modal-overlay"><div class="modal-box" id="modal-body"></div></div>

</body>
</html>
