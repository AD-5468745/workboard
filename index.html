<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkBoard — 업무 현황판</title>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where,
    getDocs, onSnapshot, orderBy, Timestamp, deleteDoc, addDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ──────────────────────────────────────────
  // 🔧 여기에 Firebase 프로젝트 설정을 붙여넣으세요
  // ──────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyDi23uzT0iokcCqU8rURUwSRPikaFALaR4",
    authDomain:        "dailywork-6ceda.firebaseapp.com",
    projectId:         "dailywork-6ceda",
    storageBucket:     "dailywork-6ceda.firebasestorage.app",
    messagingSenderId: "542297301092",
    appId:             "1:542297301092:web:a266a4891a09159087ff71"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ──────────────────────────────────────────
  // 🔧 텔레그램 알림 — Cloudflare Worker 주소만 넣으세요
  //    (봇 토큰/Chat ID는 Worker에만 보관 → 브라우저엔 비밀이 없음)
  // ──────────────────────────────────────────
  const TG_WORKER_URL = "https://workboard-telegram.내계정.workers.dev"; // ← 배포한 Worker 주소로 교체

  // ──────────────────────────────────────────
  // 상수
  // ──────────────────────────────────────────
  const DEFAULT_START = "09:00", DEFAULT_END = "18:00";
  // 근무시간(시작~종료)으로 시간 슬롯 배열 생성. 잘못된 값이면 기본 09~18.
  const hoursRange = (start=DEFAULT_START, end=DEFAULT_END) => {
    let s = parseInt((start||"").slice(0,2), 10);
    let e = parseInt((end||"").slice(0,2), 10);
    if (isNaN(s) || isNaN(e) || s < 0 || e > 24 || e <= s) { s = 9; e = 18; }
    const arr = [];
    for (let h = s; h < e; h++) arr.push(String(h).padStart(2,"0") + ":00");
    return arr;
  };
  const HOURS = hoursRange(); // 기본값(09~18). 실제 렌더는 각 사용자 근무시간 사용.
  const DAYS  = ["월","화","수","목","금"];
  const STATUS_LABEL = { done:"✅ 완료", wip:"⏳ 진행중", todo:"📋 예정", skip:"⛔ 불가" };
  const STATUS_COLOR = { done:"#22c55e", wip:"#f59e0b", todo:"#6b7280", skip:"#ef4444" };
  const BOSS_UID_KEY = "boss_uid"; // Firestore users/{uid}.role === 'boss'

  // 시각 "HH:MM" → 분. 지각/조퇴 계산용.
  const toMin = t => { const m=/^(\d{1,2}):(\d{2})/.exec(t||""); return m ? (+m[1])*60 + (+m[2]) : null; };
  const nowHM = () => { const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
  // 지각 정보: 출근시각이 근무시작보다 늦으면 late.
  const lateInfo = (clockIn, workStart) => {
    const ci = toMin(clockIn), ws = toMin(workStart||DEFAULT_START);
    if (ci==null || ws==null) return { late:false, mins:0 };
    return { late: ci > ws, mins: Math.max(0, ci - ws) };
  };

  // ── 무료 규칙기반 자동정리 (AI 없이) ──
  // 자유 문장 → {items:[{title,status,hour}], goals:[], blocker} 로 분류.
  // 나중에 이 함수만 AI 호출로 교체 가능.
  function autoOrganize(text){
    const out = { items: [], goals: [], blocker: "" };
    if(!text || !text.trim()) return out;
    // 문장 분리: 줄바꿈 · 쉼표(, · 、) · 세미콜론 · "그리고"
    const segs = text.split(/[\n,;·、]| 그리고 /).map(s=>s.trim()).filter(Boolean);
    for(const seg of segs){
      // 시간 추출: "09:00" / "9시" / "오후 2시"
      let hour = null;
      let m = /(\d{1,2}):(\d{2})/.exec(seg);
      if(m) hour = String(+m[1]).padStart(2,"0")+":00";
      else {
        let h = /(오전|오후)?\s*(\d{1,2})\s*시/.exec(seg);
        if(h){ let hh=+h[2]; if(h[1]==="오후"&&hh<12) hh+=12; if(h[1]==="오전"&&hh===12) hh=0; hour=String(hh).padStart(2,"0")+":00"; }
      }
      // 상태 키워드
      let status = "todo";
      if(/(막힘|막혔|막혀|대기|블로커|안됨|안 됨|권한\s*없|이슈|문제)/.test(seg)) status = "blocker";
      else if(/(완료|했음|했고|끝냄|끝|발송|보냄|보냈|제출|처리함|done)/.test(seg)) status = "done";
      else if(/(진행|하는 중|하다|작업 중|작업중|중임|wip)/.test(seg)) status = "wip";
      else if(/(예정|할 것|할것|해야|내일|todo|계획)/.test(seg)) status = "todo";
      const tomorrow = /내일/.test(seg);
      // 제목: 키워드/시간 흔적을 살짝 정리
      let title = seg.replace(/(\d{1,2}:\d{2})/,"").replace(/(오전|오후)?\s*\d{1,2}\s*시/,"").trim();
      title = title.replace(/(했고|했음|하다가|하다|예정임|예정|막힘|막혔음)$/,"").trim();
      if(!title) title = seg.trim();
      if(status === "blocker"){ out.blocker = out.blocker ? out.blocker+" / "+title : title; }
      else out.items.push({ title, status, hour, tomorrow });
    }
    // 핵심목표 후보: 예정/내일 항목 상위 3개
    out.goals = out.items.filter(i=>i.status==="todo").slice(0,3).map(i=>({text:i.title, done:false}));
    return out;
  }

  // ──────────────────────────────────────────
  // 상태
  // ──────────────────────────────────────────
  let currentUser = null;
  let userRole    = null; // 'boss' | 'staff'
  let userProfile = null;
  let selectedStaffUid = null;
  let unsubListeners   = [];

  // ──────────────────────────────────────────
  // 유틸
  // ──────────────────────────────────────────
  const today = () => new Date().toISOString().slice(0,10);
  const weekStart = (d=new Date()) => {
    const day = d.getDay() || 7;
    const mon = new Date(d); mon.setDate(d.getDate()-(day-1));
    return mon.toISOString().slice(0,10);
  };
  const $ = id => document.getElementById(id);
  const el = (tag,cls,html='') => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };

  // 3개월 전 날짜 (자동 삭제 기준)
  const cutoffDate = () => {
    const d = new Date(); d.setMonth(d.getMonth()-3);
    return d.toISOString().slice(0,10);
  };

  // ──────────────────────────────────────────
  // 텔레그램 알림
  // ──────────────────────────────────────────
  async function sendTelegram(name, date, summary) {
    // 토큰은 브라우저에 없음 — Cloudflare Worker가 대신 텔레그램으로 보냄.
    const text = `📋 WorkBoard 업무 보고\n👤 ${name} — ${date}\n${summary}\n\n🔗 확인: ${location.href}`;
    if(!TG_WORKER_URL || TG_WORKER_URL.includes("내계정")) return; // 주소 미설정 시 조용히 skip
    try {
      await fetch(TG_WORKER_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ text })
      });
    } catch(e){ console.warn("텔레그램 전송 실패",e); }
  }

  // ──────────────────────────────────────────
  // AUTH
  // ──────────────────────────────────────────
  onAuthStateChanged(auth, async user => {
    if (user) {
      currentUser = user;
      const snap = await getDoc(doc(db,"users",user.uid));
      userProfile = snap.data() || {};
      userRole = userProfile.role || 'staff';
      showApp();
    } else {
      currentUser = null;
      showLogin();
    }
  });

  window.doLogin = async () => {
    const id  = $('login-id').value.trim();
    const pw  = $('login-pw').value;
    const err = $('login-err');
    err.textContent = '';
    if(!id||!pw){ err.textContent='아이디와 비밀번호를 입력하세요.'; return; }
    try {
      // 아이디 → 이메일 규칙: setup.js와 동일하게 "아이디@workboard.internal"
      // (로그인 전에는 보안규칙상 Firestore를 못 읽으므로, 이메일을 직접 만든다)
      const email = `${id}@workboard.internal`;
      await signInWithEmailAndPassword(auth, email, pw);
    } catch(e){
      const code = (e && e.code) || '';
      if(code.includes('invalid-credential') || code.includes('user-not-found') || code.includes('wrong-password')){
        err.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
      } else if(code.includes('too-many-requests')){
        err.textContent = '요청이 많습니다. 잠시 후 다시 시도하세요.';
      } else {
        err.textContent = '로그인 실패: ' + (e.message || code);
      }
    }
  };

  window.doLogout = async () => { await signOut(auth); };

  // ──────────────────────────────────────────
  // 화면 전환
  // ──────────────────────────────────────────
  // 화면 잔재 제거(계정 전환 시 직원이 관리자 화면을 보는 문제 방지)
  function resetAppUI() {
    unsubListeners.forEach(u=>{ try{u();}catch(e){} }); unsubListeners = [];
    selectedStaffUid = null;
    if($('sidebar')) $('sidebar').innerHTML = '';
    if($('main-content')) $('main-content').innerHTML = '';
  }
  function showLogin() {
    resetAppUI();
    $('login-screen').style.display = 'flex';
    $('app-screen').style.display   = 'none';
  }
  function showApp() {
    resetAppUI();
    $('login-screen').style.display = 'none';
    $('app-screen').style.display   = 'flex';
    $('user-name-badge').textContent = userProfile.displayName || currentUser.email;
    $('role-badge').textContent = userRole === 'boss' ? '👑 관리자' : '👤 직원';
    $('role-badge').className = 'role-badge ' + (userRole==='boss'?'boss':'');
    if(userRole === 'boss') renderBossView();
    else renderStaffView(currentUser.uid);
  }

  // ──────────────────────────────────────────
  // ── 직원 뷰
  // ──────────────────────────────────────────
  function renderStaffView(uid) {
    if($('sidebar')) $('sidebar').style.display = 'none'; // 직원은 직원목록 사이드바 없음
    $('main-content').innerHTML = '';
    const wrap = el('div','staff-wrap');
    wrap.innerHTML = `
      <div class="page-header">
        <div>
          <div class="page-title">내 업무 현황</div>
          <div class="page-sub">${today()} · 수시 저장됩니다</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline" onclick="switchTab('week')">📅 주간 계획</button>
          <button class="btn btn-primary" onclick="switchTab('today')">📋 오늘 상세</button>
          <button class="btn btn-outline" onclick="switchTab('history')">🗂 지난 기록</button>
        </div>
      </div>
      <div id="tab-week" class="tab-panel"></div>
      <div id="tab-today" class="tab-panel" style="display:none"></div>
      <div id="tab-history" class="tab-panel" style="display:none"></div>
    `;
    $('main-content').appendChild(wrap);
    renderWeekTimetable(uid, 'tab-week', hoursRange(userProfile.workStart, userProfile.workEnd));
    renderTodayDetail(uid, 'tab-today');
  }

  window.switchTab = (tab) => {
    $('tab-week').style.display  = tab==='week'  ? '' : 'none';
    $('tab-today').style.display = tab==='today' ? '' : 'none';
    if($('tab-history')) $('tab-history').style.display = tab==='history' ? '' : 'none';
    if(tab==='history' && currentUser) renderHistory(currentUser.uid, 'tab-history');
  };

  // ── 주간 타임테이블 (직원)
  async function renderWeekTimetable(uid, containerId, hoursArr) {
    const HRS  = (hoursArr && hoursArr.length) ? hoursArr : HOURS;
    const ws   = weekStart();
    const wrap = $(containerId);
    wrap.innerHTML = '<div class="section-title">📅 이번 주 타임테이블</div>';

    const grid = el('div','week-grid');
    // 헤더
    const hdr = el('div','week-header-row');
    hdr.innerHTML = '<div class="time-col-hdr"></div>' +
      DAYS.map((d,i)=>{
        const date = new Date(ws); date.setDate(date.getDate()+i);
        const dateStr = date.toISOString().slice(0,10);
        const isToday = dateStr === today();
        return `<div class="day-hdr${isToday?' today':''}">${d}<br><span class="day-date">${date.getMonth()+1}/${date.getDate()}</span></div>`;
      }).join('');
    grid.appendChild(hdr);

    // 시간 행
    for(const hour of HRS) {
      const row = el('div','week-row');
      row.innerHTML = `<div class="time-col">${hour}</div>`;
      for(let i=0;i<5;i++){
        const date = new Date(ws); date.setDate(date.getDate()+i);
        const dateStr = date.toISOString().slice(0,10);
        const isToday = dateStr === today();
        const cell = el('div','week-cell'+(isToday?' today-col':''));
        cell.dataset.date = dateStr;
        cell.dataset.hour = hour;
        cell.dataset.uid  = uid;
        cell.addEventListener('click', () => openSlotModal(uid, dateStr, hour, cell));
        row.appendChild(cell);
      }
      grid.appendChild(row);
    }
    wrap.appendChild(grid);

    // 데이터 로드
    const q = query(
      collection(db,"slots"),
      where("uid","==",uid),
      where("weekStart","==",ws)
    );
    const snap = await getDocs(q);
    snap.forEach(d => {
      const s = d.data();
      const cell = wrap.querySelector(`[data-date="${s.date}"][data-hour="${s.hour}"]`);
      if(cell) renderCellContent(cell, s);
    });

    // 실시간 구독
    const unsub = onSnapshot(q, snap => {
      snap.docChanges().forEach(ch => {
        const s = ch.doc.data();
        const cell = wrap.querySelector(`[data-date="${s.date}"][data-hour="${s.hour}"]`);
        if(cell) renderCellContent(cell, ch.type==='removed'?null:s);
      });
    });
    unsubListeners.push(unsub);
  }

  function renderCellContent(cell, s) {
    cell.innerHTML = '';
    if(!s||!s.title) { cell.classList.remove('has-data'); return; }
    cell.classList.add('has-data');
    const chip = el('div','slot-chip');
    chip.style.borderLeftColor = STATUS_COLOR[s.status]||'#6b7280';
    const badge = (s.needsHelp?` <span style="color:#f59e0b;font-size:10px">🆘</span>`:'') + ((s.links||[]).length?` <span style="color:#8fb0f0;font-size:10px">🔗${s.links.length}</span>`:'');
    chip.innerHTML = `<div class="slot-title">${s.title}${badge}</div><div class="slot-status" style="color:${STATUS_COLOR[s.status]}">${STATUS_LABEL[s.status]||''}</div>`;
    cell.appendChild(chip);
  }

  // ── 링크/도움요청 헬퍼 ──
  const isValidUrl = u => /^https?:\/\/\S+$/i.test((u||'').trim());
  const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  window.addLinkRow = (label='', url='') => {
    const box = $('s-links'); if(!box) return;
    const row = el('div','tomorrow-row');
    row.innerHTML = `<input class="form-input link-label" placeholder="이름(예: 시트)" style="width:120px" value="${esc(label)}">`+
      `<input class="form-input link-url" placeholder="https://..." value="${esc(url)}">`+
      `<button type="button" onclick="this.parentElement.remove()" style="background:transparent;border:none;color:#4a4e63;cursor:pointer">✕</button>`;
    box.appendChild(row);
  };
  // 링크칩(클릭 새 탭)
  const linkPills = (links) => (links||[]).filter(l=>isValidUrl(l.url))
    .map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:4px;background:#141c2e;border:1px solid #26406b;color:#8fb0f0;border-radius:20px;padding:2px 9px;font-size:11px;text-decoration:none;margin:3px 4px 0 0">🔗 ${esc(l.label||'링크')}</a>`).join('');

  // ── 슬롯 모달
  function openSlotModal(uid, date, hour, cellEl) {
    const isOwner = currentUser.uid === uid;
    const isBoss  = userRole === 'boss';
    if(!isOwner && !isBoss) return;

    const existing = {}; // 기존 데이터 로드
    const slotId = `${uid}_${date}_${hour.replace(':','')}`;
    getDoc(doc(db,"slots",slotId)).then(snap => {
      const d = snap.exists() ? snap.data() : {};
      showModal(`
        <div class="modal-title">📌 슬롯 편집 — ${date} ${hour}</div>
        <div class="form-group">
          <label>업무 내용</label>
          <input id="s-title" class="form-input" list="title-suggest" placeholder="업무 내용 (최근 업무 자동완성)" value="${d.title||''}">
          <datalist id="title-suggest"></datalist>
        </div>
        <div class="form-group">
          <label>상태</label>
          <div class="status-btns">
            ${Object.entries(STATUS_LABEL).map(([k,v])=>`<button class="status-btn ${d.status===k?'active':''}" data-s="${k}" style="--sc:${STATUS_COLOR[k]}">${v}</button>`).join('')}
          </div>
        </div>
        <div class="form-group">
          <label>메모 (선택)</label>
          <textarea id="s-memo" class="form-textarea" placeholder="상세 내용, 이슈 등">${d.memo||''}</textarea>
        </div>
        <div class="form-group">
          <label>🔗 관련 링크 (도메인·구글시트 등 · 여러 개 가능)</label>
          <div id="s-links"></div>
          <button type="button" class="btn btn-outline" style="margin-top:6px" onclick="addLinkRow()">＋ 링크 추가</button>
        </div>
        ${isOwner?`<div class="form-group" style="border:1px solid #4a2020;border-radius:8px;padding:10px;background:#1a1012">
          <label class="row" style="gap:6px;color:#f59e0b;cursor:pointer;display:flex;align-items:center"><input type="checkbox" id="s-help" ${d.needsHelp&&!d.helpResolved?'checked':''}> 🆘 이 업무 관리자에게 도움요청</label>
          <input id="s-help-note" class="form-input" style="margin-top:6px" placeholder="어디가 어려운지 한 줄 (선택)" value="${esc(d.helpNote)}">
        </div>`:''}
        ${isBoss&&d.needsHelp&&!d.helpResolved?`<div class="form-group"><button type="button" class="btn btn-outline" id="slot-resolve" style="color:#22c55e;border-color:#204d36">✅ 도움요청 해결로 표시</button></div>`:''}
        ${isBoss&&!isOwner?`<div class="form-group"><label>관리자 코멘트</label><textarea id="s-comment" class="form-textarea" placeholder="직원에게 보낼 코멘트">${d.bossComment||''}</textarea></div>`:''}
        <div class="modal-footer">
          ${d.title?`<button class="btn btn-danger" id="slot-del">삭제</button>`:''}
          <button class="btn btn-outline" onclick="closeModal()">취소</button>
          <button class="btn btn-primary" id="slot-save">저장</button>
        </div>
      `);

      // 상태 버튼 토글
      let selStatus = d.status||'todo';
      document.querySelectorAll('.status-btn').forEach(b=>{
        b.addEventListener('click',()=>{
          selStatus=b.dataset.s;
          document.querySelectorAll('.status-btn').forEach(x=>x.classList.remove('active'));
          b.classList.add('active');
        });
      });

      // 링크 행 채우기(없으면 빈 행 1개)
      (d.links||[]).forEach(l=>addLinkRow(l.label,l.url));
      if(!(d.links&&d.links.length)) addLinkRow();

      // 자주 쓰는 업무 자동완성(최근 업무 제안)
      getDocs(query(collection(db,"slots"),where("uid","==",uid))).then(sn=>{
        const titles=new Set(); sn.forEach(x=>{ const tt=(x.data().title||'').trim(); if(tt) titles.add(tt); });
        const dl=$('title-suggest'); if(dl) dl.innerHTML=[...titles].slice(0,25).map(x=>`<option value="${esc(x)}"></option>`).join('');
      }).catch(()=>{});

        await setDoc(doc(db,"slots",slotId), { needsHelp:false, updatedAt:Timestamp.now() }, {merge:true});

      $('slot-save').onclick = async () => {
        const title = $('s-title').value.trim();

        const links = [...document.querySelectorAll('#s-links .tomorrow-row')]
          .map(r=>({ label:r.querySelector('.link-label').value.trim(), url:r.querySelector('.link-url').value.trim() }))
          .filter(l=>isValidUrl(l.url));
        const payload = {
          uid, date, hour, title,

          memo: $('s-memo').value.trim(),
          links,
          weekStart: weekStart(new Date(date)),

        };

        await setDoc(doc(db,"slots",slotId), payload, {merge:true});

        // 텔레그램 (직원 본인 저장 시)

          const name = userProfile.displayName||currentUser.email;
          const doneQ = query(collection(db,"slots"),where("uid","==",uid),where("date","==",date));

          await sendTelegram(name, date, summary);
        }
        renderCellContent(cellEl, payload);
        closeModal();
      };

      if($('slot-del')) {
        $('slot-del').onclick = async () => {
          if(!confirm('이 슬롯을 삭제할까요?')) return;

          renderCellContent(cellEl, null);
          closeModal();
        };
      }
    });
  }

    const routines = [];

  // 일지 완성도 + 어제 개선점 리마인드
  async function renderTodayStatus(uid, dateStr){
    const box = $('today-status'); if(!box) return;
    const y = new Date(dateStr); y.setDate(y.getDate()-1); const yStr = y.toISOString().slice(0,10);
    const [ySnap, tSnap, slotSnap, slotYSnap] = await Promise.all([
      getDoc(doc(db,"daily",`${uid}_${yStr}`)),
      getDoc(doc(db,"daily",`${uid}_${dateStr}`)),
      getDocs(query(collection(db,"slots"),where("uid","==",uid),where("date","==",dateStr))),
      getDocs(query(collection(db,"slots"),where("uid","==",uid),where("date","==",yStr)))
    ]);
    const yData = ySnap.exists()?ySnap.data():{};
    const yImprove = (yData.improve||'').trim();
    const t = tSnap.exists()?tSnap.data():{};
    const goals = (t.topGoals||[]).filter(g=>(g.text||'').trim()).length;
    const has = { '출근':!!t.clockIn, '시간표':slotSnap.size>0, '목표':goals>0, '회고':!!((t.selfFeedback||'').trim()||(t.improve||'').trim()) };
    const keys = Object.keys(has); const missing = keys.filter(k=>!has[k]);
    const pct = Math.round((keys.length-missing.length)/keys.length*100);
    const color = pct>=100?'#22c55e':pct>=50?'#f59e0b':'#ef4444';
    let html = '';
    if(yImprove) html += `<div style="background:#141c2e;border:1px solid #26406b;border-radius:8px;padding:8px 12px;font-size:12px;color:#8fb0f0;margin-bottom:8px">💡 어제 개선점: ${esc(yImprove)}</div>`;
    html += `<div style="background:#161922;border:1px solid #252836;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:8px"><b style="color:${color}">오늘 일지 완성도 ${pct}%</b> · ${keys.map(k=>`${has[k]?'✅':'⬜'} ${k}`).join(' · ')}${missing.length?` <span style="color:#f59e0b">— ${missing.join(', ')} 비었어요</span>`:' 👍'}</div>`;
    box.innerHTML = html;

    // 자동 이월: 어제 '내일 계획' → 오늘 목표 (오늘 목표가 완전히 비었을 때만)
    const goalInputs = [...document.querySelectorAll('.goal-text')];
    const goalsEmptyDom = goalInputs.length>0 && goalInputs.every(i=>!i.value.trim());
    const yTomorrow = (yData.tomorrowTasks||[]).filter(s=>(s||'').trim());
    if(goalsEmptyDom && goals===0 && yTomorrow.length){
      renderGoalRows(yTomorrow.slice(0,3).map(x=>({text:x,done:false})));

    const unsub = onSnapshot(q, snap2 => {

      <div>${chips.join('')||'<span class="page-sub">분류할 항목을 못 찾았어요. 쉼표로 나눠 다시 써보세요.</span>'}</div>

    </div>`;

  window.applyOrganize = async (uid) => {
    if(!pendingOrganize) return;
    const dateStr = today();
    const ws = weekStart(new Date(dateStr));
    const hrs = hoursRange((userProfile&&userProfile.workStart)||DEFAULT_START,(userProfile&&userProfile.workEnd)||DEFAULT_END);
    const used = new Set(pendingOrganize.items.filter(i=>i.hour).map(i=>i.hour));
    let freeIdx = 0; const writes = [];
    for(const it of pendingOrganize.items){
      let hour = it.hour;
      if(!hour){ while(freeIdx<hrs.length && used.has(hrs[freeIdx])) freeIdx++; if(freeIdx>=hrs.length) continue; hour=hrs[freeIdx]; used.add(hour); freeIdx++; }
      const slotId = `${uid}_${dateStr}_${hour.replace(':','')}`;
      writes.push(setDoc(doc(db,"slots",slotId), { uid, date:dateStr, hour, title:it.title, status:it.status, weekStart:ws, updatedAt:Timestamp.now() }, {merge:true}));
    }
    if(pendingOrganize.goals.length) writes.push(setDoc(doc(db,"daily",`${uid}_${dateStr}`), { uid, date:dateStr, topGoals:pendingOrganize.goals, updatedAt:Timestamp.now() }, {merge:true}));
    if(pendingOrganize.blocker) writes.push(setDoc(doc(db,"daily",`${uid}_${dateStr}`), { uid, date:dateStr, blocker:pendingOrganize.blocker, updatedAt:Timestamp.now() }, {merge:true}));
    await Promise.all(writes);
    if($('brain-dump')) $('brain-dump').value='';
    if($('organize-preview')) $('organize-preview').innerHTML='<div class="page-sub" style="margin-top:10px;color:#22c55e">✓ 적용됐어요. 타임테이블·목표·블로커를 확인하세요.</div>';
    loadTodaySlots(uid, dateStr);
    loadDailyReport(uid, dateStr);
    pendingOrganize = null;
  };

          <div class="card-title" style="margin-top:16px"><span class="dot" style="background:#7ab040"></span> 관리자 코멘트 달기</div>
          <textarea id="boss-comment-input" class="form-textarea" placeholder="직원에게 코멘트를 남기세요" style="height:80px">${dData.bossComment||''}</textarea>
          <div style="text-align:right;margin-top:8px">
            <button class="btn btn-primary" onclick="saveBossComment('${s.uid}','${dateStr}')">코멘트 저장</button>
          </div>
        </div>
      `;
    }
  }

  window.approveSlot = async (slotId, approved) => {
    let reason = '';
    if(!approved){
      reason = (prompt('반려 사유를 입력하세요 (직원에게 전달됩니다)')||'').trim();
      if(!reason){ alert('반려하려면 사유가 필요합니다.'); return; }
    }
    const payload = { approved, approvedAt: Timestamp.now(), approvedBy: currentUser.uid };
    if(!approved) payload.bossComment = '[반려] ' + reason;
    await setDoc(doc(db,"slots",slotId), payload, {merge:true});
    alert(approved?'승인했습니다.':'반려했습니다(사유가 직원에게 전달됨).');
  };

  window.saveBossComment = async (uid, dateStr) => {
    const comment = $('boss-comment-input')?.value.trim()||'';
    await setDoc(doc(db,"daily",`${uid}_${dateStr}`),{ bossComment: comment, bossCommentAt: Timestamp.now() },{merge:true});
    alert('코멘트가 저장되었습니다.');
  };

  window.openAddTaskModal = (uid, name) => {
    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
    const tStr = tomorrow.toISOString().slice(0,10);
    showModal(`
      <div class="modal-title">📎 업무 배정 — ${name}</div>
      <div class="form-group"><label>날짜</label><input id="at-date" type="date" class="form-input" value="${tStr}"></div>
      <div class="form-group"><label>시간 슬롯</label>
        <select id="at-hour" class="form-input">${HOURS.map(h=>`<option>${h}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>업무 내용</label><input id="at-title" class="form-input" placeholder="업무 내용"></div>
      <div class="form-group"><label>메모 (선택)</label><textarea id="at-memo" class="form-textarea" placeholder="상세 지시사항"></textarea></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveAddedTask('${uid}')">배정</button>
      </div>
    `);
  };

  window.saveAddedTask = async (uid) => {
    const date  = $('at-date').value;
    const hour  = $('at-hour').value;
    const title = $('at-title').value.trim();
    const memo  = $('at-memo').value.trim();
    if(!title){ alert('업무 내용을 입력하세요'); return; }
    const slotId = `${uid}_${date}_${hour.replace(':','')}`;
    await setDoc(doc(db,"slots",slotId),{
      uid, date, hour, title, memo, status:'todo',
      weekStart: weekStart(new Date(date)),
      assignedBy: currentUser.uid,
      updatedAt: Timestamp.now()
    },{merge:true});
    closeModal();
    alert('업무가 배정되었습니다.');
  };

  window.openBossCommentModal = (uid, name) => {
    showModal(`
      <div class="modal-title">💬 지시 보내기 — ${name}</div>
      <div class="form-group"><label>지시 내용</label><textarea id="direct-msg" class="form-textarea" style="height:120px" placeholder="직원에게 전달할 지시사항을 입력하세요"></textarea></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="sendDirectMessage('${uid}')">전송</button>
      </div>
    `);
  };

  window.sendDirectMessage = async (uid) => {
    const msg = $('direct-msg')?.value.trim()||'';
    if(!msg){ alert('내용을 입력하세요'); return; }
    const dateStr = today();
    await setDoc(doc(db,"daily",`${uid}_${dateStr}`),{
      bossComment: msg, bossCommentAt: Timestamp.now(), bossCommentBy: currentUser.uid
    },{merge:true});
    closeModal();
    alert('지시가 전달되었습니다.');
  };

  // ── 팀 전체 보기
  async function renderTeamOverview(staffList) {
    document.querySelectorAll('.staff-item').forEach(i=>i.classList.remove('active'));
    const main = $('main-content');
    const dateStr = today();
    main.innerHTML = `
      <div class="page-header">
        <div class="page-title">📊 팀 전체 현황 — ${dateStr}</div>
      </div>
      <div id="team-alerts"></div>
      <div id="team-banner"></div>
      <div class="team-grid" id="team-grid"></div>
    `;
    const grid = $('team-grid');
    const blockers = [];
    const helps = [];
    const alerts = [];
    for(const s of staffList) {
      const q = query(collection(db,"slots"),where("uid","==",s.uid),where("date","==",dateStr));
      const sn = await getDocs(q);
      let done=0,wip=0,undone=0,helpN=0;
      sn.forEach(d=>{ const sd=d.data(); const st=sd.status; if(st==='done')done++; else if(st==='wip')wip++; else undone++; if(sd.needsHelp){ helpN++; helps.push({name:s.displayName||s.email, title:sd.title||''}); } });
      const total = done+wip+undone;
      const pct = total>0?Math.round(done/total*100):0;
      const pc = pct>=80?'#22c55e':pct>=50?'#f59e0b':'#ef4444';

      const dSnap = await getDoc(doc(db,"daily",`${s.uid}_${dateStr}`));
      const dd = dSnap.exists()?dSnap.data():{};
      const feedback = dd.selfFeedback||'';
      const li = lateInfo(dd.clockIn, s.workStart);
      const goals = dd.topGoals||[];
      const goalsDone = goals.filter(g=>g.done).length;
      const blocker = (dd.blocker||'').trim();
      if(blocker && !dd.blockerResolved) blockers.push({name:s.displayName||s.email, text:blocker});

      // 이상신호 자동감지
      const anom = [];
      if(dd.clockIn && total===0) anom.push('출근했으나 업무 미기록');
      const anyMemo = sn.docs.some(x=>(x.data().memo||'').trim());
      if(total>0 && done===total && !anyMemo && !feedback.trim()) anom.push('전부 완료·근거 없음');
      try {
        const dAll = await getDocs(query(collection(db,"daily"),where("uid","==",s.uid)));
        const daysArr = []; dAll.forEach(x=>daysArr.push(x.data()));
        daysArr.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
        const recent3 = daysArr.slice(0,3);
        if(recent3.length>=3 && recent3.every(day=>{ const g=day.topGoals||[]; return g.length===0 || g.filter(x=>x.done).length < g.length; })) anom.push('목표 3일 연속 미달');
      } catch(e){}
      anom.forEach(a=>alerts.push({name:s.displayName||s.email, text:a}));

      const att = dd.clockIn
        ? `출근 ${dd.clockIn} · ${li.late?`<span style="color:#f59e0b;font-weight:700">지각 ${li.mins}분</span>`:`<span style="color:#22c55e">정상</span>`}${dd.clockOut?` · 퇴근 ${dd.clockOut}`:''}`
        : '<span style="color:#8b8fa8">미출근</span>';

      const card = el('div','team-card');
      card.innerHTML = `
        <div class="team-card-header">
          <div class="staff-avatar" style="background:${s.color||'#5b8af0'}">${(s.displayName||'?')[0]}</div>
          <div>
            <div style="font-weight:700;color:#fff">${s.displayName||s.email}</div>
            <div style="font-size:11px;color:#6b7090">${att}</div>
          </div>
          <div style="margin-left:auto;font-size:20px;font-weight:800;color:${pc}">${pct}%</div>
        </div>
        <div class="progress-bar"><div style="width:${pct}%;background:${pc}"></div></div>
        <div class="team-stats">
          <span style="color:#22c55e">✅ ${done}</span>
          <span style="color:#f59e0b">⏳ ${wip}</span>
          <span style="color:#6b7090">📋 ${undone}</span>
          <span style="color:#8fb0f0;margin-left:auto">🎯 ${goalsDone}/${goals.length}</span>
        </div>
        ${blocker?`<div style="font-size:11px;font-weight:700;color:#ef8f8f;background:#221012;border:1px solid #4a2020;border-radius:6px;padding:4px 8px;margin-top:8px">🚨 ${blocker}</div>`:''}
        ${anom.length?`<div style="font-size:11px;font-weight:700;color:#f5c26b;background:#1a1408;border:1px solid #5a3a12;border-radius:6px;padding:4px 8px;margin-top:6px">⚠️ ${esc(anom.join(' · '))}</div>`:''}
        ${feedback?`<div class="team-feedback">"${feedback.slice(0,80)}${feedback.length>80?'…':''}"</div>`:'<div class="team-feedback no-input">아직 피드백 없음</div>'}
        <button class="btn btn-outline" style="width:100%;margin-top:10px;font-size:11px">상세 보기 →</button>
      `;
      card.querySelector('button').addEventListener('click',()=>selectStaff(s,staffList));
      grid.appendChild(card);
    }
    const awrap = $('team-alerts');
    if(awrap && alerts.length){
      awrap.innerHTML = `<div style="background:#1a1408;border:1px solid #5a3a12;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#f0d0a0">`+
        `<b style="color:#f59e0b">⚠️ 주목 ${alerts.length}건</b> · ${alerts.map(a=>esc(`${a.name}: ${a.text}`)).join(' · ')}</div>`;
    }
    const bwrap = $('team-banner');
    const items = [];
    blockers.forEach(b=>items.push(`${b.name} (${b.text})`));
    helps.forEach(h=>items.push(`${h.name} — ${h.title}`));
    if(bwrap && items.length){
      bwrap.innerHTML = `<div style="background:#221012;border:1px solid #5a2626;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#f0b8b8">`+
        `<b style="color:#ef4444">🆘 도움요청 ${items.length}건</b> · ${items.map(esc).join(' · ')}</div>`;
    }
  }

  // ──────────────────────────────────────────
  // 모달
  // ──────────────────────────────────────────
  window.showModal = (html) => {
    $('modal-body').innerHTML = html;
    $('modal-overlay').style.display = 'flex';
  };
  window.closeModal = () => { $('modal-overlay').style.display = 'none'; };
  $('modal-overlay')?.addEventListener('click', e => { if(e.target===$('modal-overlay'))closeModal(); });
</script>

.modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid #252836; }

/* ── 스크롤바 */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#252836; border-radius:2px; }
</style>
</head>
<body>

<!-- ── 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Work<span>Board</span></div>
    <div class="login-sub">업무 현황 관리 시스템</div>
    <label class="login-label">아이디</label>
    <input id="login-id" class="login-input" placeholder="아이디 입력" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()">
    <label class="login-label">비밀번호</label>
    <input id="login-pw" class="login-input" type="password" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>

<!-- ── 앱 화면 -->
<div id="app-screen">
  <!-- 상단 네비 -->
  <div class="top-nav">
    <div class="nav-logo">Work<span>Board</span></div>
    <div class="nav-right">
      <span class="user-name" id="user-name-badge"></span>
      <div id="role-badge" class="role-badge"></div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 앱 바디 -->
  <div class="app-body">
    <div id="sidebar"></div>
    <div id="main-content"></div>
  </div>
</div>

<!-- 모달 -->
<div id="modal-overlay">
  <div class="modal-box" id="modal-body"></div>
</div>

</body>
</html>
